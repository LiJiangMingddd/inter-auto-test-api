server:
  port: 8849

spring:
  datasource:
    url: jdbc:mysql://192.168.150.101:3306/auto_test_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.lm.interautotestapi.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  token-name: Authorization
  timeout: 86400
  token-style: uuid
  is-concurrent: true
  is-share: true
  jwt-secret-key: inter-auto-test-api-secret-key

logging:
  level:
    com.lm.interautotestapi: DEBUG
