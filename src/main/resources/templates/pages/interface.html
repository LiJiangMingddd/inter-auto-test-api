<!DOCTYPE html>
<!-- ============================================================
     接口管理页面碎片
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="interface-page">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-list"></i> 接口列表</h3>
            <div class="toolbar">
                <div class="search-bar">
                    <input class="layui-input" id="interfaceKeyword" placeholder="搜索接口名称/描述..." style="width:200px;">
                    <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="loadInterface(1)">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <button class="layui-btn layui-btn-sm" onclick="showInterfaceForm()">
                    <i class="fas fa-plus"></i> 新增接口
                </button>
            </div>
        </div>
        <table class="layui-table" lay-skin="line">
            <thead>
            <tr>
                <th style="width:60px;">ID</th>
                <th>接口名称</th>
                <th style="width:80px;">方法</th>
                <th>DEV 地址</th>
                <th>UAT 地址</th>
                <th>PRO 地址</th>
                <th style="width:80px;">状态</th>
                <th style="width:150px;">操作</th>
            </tr>
            </thead>
            <tbody id="interfaceTbody"></tbody>
        </table>
        <div id="interfacePage" style="text-align:center;padding:10px 0;"></div>
    </div>

    <script>
    // ============================================================
    //  接口 CRUD
    // ============================================================
    /** 加载接口列表 */
    function loadInterface(page) {
        var keyword = document.getElementById('interfaceKeyword') ? document.getElementById('interfaceKeyword').value : '';
        ajax({
            url: '/api/interface/page?pageNum=' + page + '&pageSize=10&keyword=' + encodeURIComponent(keyword),
            success: function(res) {
                if (res.code !== 200) { layer.msg(res.msg); return; }
                var data = res.data, html = '';
                (data.records || []).forEach(function(item, i) {
                    var statusHtml = item.enabled === 1
                        ? '<span class="tag tag-success"><i class="fas fa-check-circle"></i> 启用</span>'
                        : '<span class="tag tag-danger"><i class="fas fa-times-circle"></i> 禁用</span>';
                    html += '<tr class="table-row-enter" style="animation-delay:' + (i * 0.05) + 's">' +
                        '<td>' + item.id + '</td>' +
                        '<td><strong>' + escHtml(item.apiName) + '</strong>' + (item.apiInfo ? '<br><small style="color:#999;">' + escHtml(item.apiInfo) + '</small>' : '') + '</td>' +
                        '<td><span class="tag tag-primary">' + escHtml(item.method) + '</span></td>' +
                        renderUrlCell(item.urlDev) +
                        renderUrlCell(item.urlUat) +
                        renderUrlCell(item.urlPro) +
                        '<td>' + statusHtml + '</td>' +
                        '<td>' +
                        '<button class="action-btn edit" onclick="editInterface(' + item.id + ')"><i class="fas fa-pen"></i> 编辑</button> ' +
                        '<button class="action-btn danger" onclick="deleteInterface(' + item.id + ')"><i class="fas fa-trash"></i> 删除</button>' +
                        '</td></tr>';
                });
                if (!html) {
                    html = '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-database"></i><p>暂无数据</p></div></td></tr>';
                }
                document.getElementById('interfaceTbody').innerHTML = html;
                renderPager('interfacePage', data, loadInterface);
            }
        });
    }

    /** 打开新增/编辑弹窗 */
    function showInterfaceForm(data) {
        var isEdit = !!data;
        var title = isEdit ? '编辑接口' : '新增接口';
        var d = data || {};

        var html =
            '<div style="padding:24px 28px;">' +
            '<div class="layui-form">' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-tag"></i> 名称</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_name" class="layui-input" value="' + escHtml(d.apiName||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-info-circle"></i> 描述</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_info" class="layui-input" value="' + escHtml(d.apiInfo||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-code"></i> 方法</label><div class="layui-input-block" style="margin-left:110px;"><select id="f_method" class="layui-input">' +
            ['GET','POST','PUT','DELETE','PATCH'].map(function(m) { return '<option value="' + m + '"' + (d.method===m?'selected':'') + '>' + m + '</option>'; }).join('') +
            '</select></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-server"></i> DEV</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_urlDev" class="layui-input" value="' + escHtml(d.urlDev||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-server"></i> UAT</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_urlUat" class="layui-input" value="' + escHtml(d.urlUat||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-server"></i> PRO</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_urlPro" class="layui-input" value="' + escHtml(d.urlPro||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-cog"></i> 服务编码</label><div class="layui-input-block" style="margin-left:110px;"><input id="f_serviceCode" class="layui-input" value="' + escHtml(d.serviceCode||'') + '"></div></div>' +
            '<div class="layui-form-item"><label class="layui-form-label" style="width:90px;"><i class="fas fa-toggle-on"></i> 状态</label><div class="layui-input-block" style="margin-left:110px;"><select id="f_enabled" class="layui-input"><option value="1"' + (d.enabled===1||d.enabled==null?'selected':'') + '>启用</option><option value="0"' + (d.enabled===0?'selected':'') + '>禁用</option></select></div></div>' +
            '</div></div>';

        openLayer(title, html, ['540px', '480px'], function(index) {
            var obj = {
                apiName: document.getElementById('f_name').value,
                apiInfo: document.getElementById('f_info').value,
                method: document.getElementById('f_method').value,
                urlDev: document.getElementById('f_urlDev').value,
                urlUat: document.getElementById('f_urlUat').value,
                urlPro: document.getElementById('f_urlPro').value,
                serviceCode: document.getElementById('f_serviceCode').value,
                enabled: parseInt(document.getElementById('f_enabled').value)
            };
            if (isEdit) obj.id = d.id;
            ajax({
                url: '/api/interface', method: isEdit ? 'PUT' : 'POST',
                contentType: 'application/json', data: JSON.stringify(obj),
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('保存成功！', {icon:1}); loadInterface(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    function editInterface(id) {
        ajax({ url: '/api/interface/' + id, success: function(res) { if (res.code === 200) showInterfaceForm(res.data); } });
    }

    function deleteInterface(id) {
        layer.confirm('<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;margin-right:8px;"></i> 确定删除该接口？', { icon: 3, title: '确认' }, function(index) {
            ajax({ url: '/api/interface/' + id, method: 'DELETE',
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('已删除', {icon:1}); loadInterface(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    /** HTML 转义 */
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    </script>
</div>
