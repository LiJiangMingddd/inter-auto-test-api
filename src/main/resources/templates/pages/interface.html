<!DOCTYPE html>
<!-- ============================================================
     接口管理页面碎片
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="interface-page">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-list"></i> 接口列表</h3>
            <div class="toolbar">
                <div class="search-bar">
                    <input class="layui-input" id="interfaceKeyword" placeholder="搜索接口名称/描述..." style="width:180px;">
                    <select id="interfaceMethod" style="height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 8px;font-size:13px;background:var(--input-bg);color:var(--text-primary);outline:none;cursor:pointer;">
                        <option value="">全部方法</option>
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                        <option value="PATCH">PATCH</option>
                    </select>
                    <select id="interfaceEnv" style="height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 8px;font-size:13px;background:var(--input-bg);color:var(--text-primary);outline:none;cursor:pointer;">
                        <option value="">全部环境</option>
                        <option value="dev">DEV</option>
                        <option value="uat">UAT</option>
                        <option value="pro">PRO</option>
                    </select>
                    <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="loadInterface(1)">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <button class="layui-btn layui-btn-sm" onclick="showInterfaceForm()">
                    <i class="fas fa-plus"></i> 新增接口
                </button>
            </div>
        </div>
        <table class="layui-table" lay-skin="line" style="table-layout:auto;">
            <thead>
            <tr>
                <th style="min-width:140px;">接口名称</th>
                <th style="width:70px;">方法</th>
                <th style="width:55px;">用例</th>
                <th style="width:70px;">状态</th>
                <th class="ops-cell">操作</th>
            </tr>
            </thead>
            <tbody id="interfaceTbody"></tbody>
        </table>
        <div id="interfacePage" style="text-align:center;padding:10px 0;"></div>
    </div>

    <script>
    // ============================================================
    //  接口 CRUD
    // ============================================================
    /** 加载接口列表 */
    function loadInterface(page) {
        var keyword = document.getElementById('interfaceKeyword') ? document.getElementById('interfaceKeyword').value : '';
        var method = document.getElementById('interfaceMethod') ? document.getElementById('interfaceMethod').value : '';
        var env = document.getElementById('interfaceEnv') ? document.getElementById('interfaceEnv').value : '';
        var url = '/api/interface/page?pageNum=' + page + '&pageSize=10&keyword=' + encodeURIComponent(keyword);
        if (method) url += '&method=' + encodeURIComponent(method);
        if (env) url += '&env=' + encodeURIComponent(env);
        ajax({
            url: url,
            success: function(res) {
                if (res.code !== 200) { layer.msg(res.msg); return; }
                var data = res.data, html = '';
                (data.records || []).forEach(function(item, i) {
                    var statusHtml = item.enabled === 1
                        ? '<span class="tag tag-success"><i class="fas fa-check-circle"></i> 启用</span>'
                        : '<span class="tag tag-danger"><i class="fas fa-times-circle"></i> 禁用</span>';
                    var tcCount = item.testcaseCount != null ? item.testcaseCount : '-';
                    var ifaceErrors = validateInterface(item);
                    var warnHtml = ifaceErrors.length > 0 ? ' <span class="format-warning">' + buildWarnDot(ifaceErrors) + '</span>' : '';
                    html += '<tr class="table-row-enter" style="animation-delay:' + (i * 0.05) + 's">' +
                        '<td><span class="cell-tip"><strong>' + escHtml(item.apiName) + '</strong>' + (item.apiInfo ? '<span class="tip-content">' + escHtml(item.apiName) + '：' + escHtml(item.apiInfo) + '</span>' : '') + '</span>' + warnHtml + '</td>' +
                        '<td><span class="tag tag-primary">' + escHtml(item.method) + '</span></td>' +
                        '<td style="text-align:center;"><span class="tag tag-primary">' + tcCount + '</span></td>' +
                        '<td>' + statusHtml + '</td>' +
                        '<td class="ops-cell">' +
                        '<button class="action-btn perm" onclick="showInterfaceDetail(' + item.id + ')" title="查看详情"><i class="fas fa-eye"></i> 详情</button>' +
                        '<button class="action-btn edit" onclick="editInterface(' + item.id + ')"><i class="fas fa-pen"></i> 编辑</button>' +
                        '<button class="action-btn danger" onclick="deleteInterface(' + item.id + ')"><i class="fas fa-trash"></i> 删除</button>' +
                        '</td></tr>';
                });
                if (!html) {
                    html = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-database"></i><p>暂无数据</p></div></td></tr>';
                }
                document.getElementById('interfaceTbody').innerHTML = html;
                renderPager('interfacePage', data, loadInterface);
            }
        });
    }

    /** 接口详情弹窗：展示接口信息 + 关联测试用例 */
    function showInterfaceDetail(interfaceId) {
        ajax({
            url: '/api/interface/' + interfaceId + '/detail',
            success: function(res) {
                if (res.code !== 200) { layer.msg(res.msg); return; }
                var data = res.data;
                var iface = data.interface;
                var testcases = data.testcases || [];

                // 接口基本信息
                var infoHtml =
                    '<div style="margin-bottom:16px;">' +
                    '<table class="layui-table" style="margin:0;">' +
                    '<tr><td style="width:100px;color:var(--text-secondary);">接口名称</td><td style="color:var(--text-primary);"><strong>' + escHtml(iface.apiName) + '</strong></td></tr>' +
                    (iface.apiInfo ? '<tr><td style="color:var(--text-secondary);">描述</td><td style="color:var(--text-secondary);">' + escHtml(iface.apiInfo) + '</td></tr>' : '') +
                    '<tr><td style="color:var(--text-secondary);">请求方法</td><td><span class="tag tag-primary">' + escHtml(iface.method) + '</span></td></tr>' +
                    '<tr><td style="color:var(--text-secondary);">服务编码</td><td style="color:var(--text-secondary);">' + escHtml(iface.serviceCode||'-') + '</td></tr>' +
                    '<tr><td style="color:var(--text-secondary);">状态</td><td>' + (iface.enabled === 1 ? '<span class="tag tag-success">启用</span>' : '<span class="tag tag-danger">禁用</span>') + '</td></tr>' +
                    '</table></div>';

                // URL 信息
                var urlHtml = '<div style="display:flex;gap:10px;margin-bottom:16px;">';
                var urls = [
                    { label: 'DEV', url: iface.urlDev, cls: 'dev' },
                    { label: 'UAT', url: iface.urlUat, cls: 'uat' },
                    { label: 'PRO', url: iface.urlPro, cls: 'pro' }
                ];
                urls.forEach(function(u) {
                    urlHtml += '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);">' +
                        '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;"><span class="env-badge ' + u.cls + '">' + u.label + '</span></div>' +
                        '<div style="font-size:12px;word-break:break-all;font-family:monospace;color:var(--text-secondary);">' + (u.url ? escHtml(u.url) : '<span style="color:var(--text-muted);">未配置</span>') + '</div></div>';
                });
                urlHtml += '</div>';

                // 用例列表
                var tcHtml = '<h4 style="margin:16px 0 10px;font-size:14px;color:var(--text-primary);"><i class="fas fa-vial" style="color:#667eea;"></i> 关联测试用例（共 ' + testcases.length + ' 个）</h4>';
                if (testcases.length === 0) {
                    tcHtml += '<div class="empty-state" style="padding:20px 0;"><i class="fas fa-flask" style="font-size:28px;"></i><p style="font-size:13px;">暂无用例</p></div>';
                } else {
                    tcHtml += '<table class="layui-table" lay-skin="line" style="margin:0;font-size:13px;">' +
                        '<thead><tr><th style="width:50px;">#</th><th>用例标题</th><th style="width:60px;">环境</th><th style="width:40px;">排序</th><th style="width:60px;">状态</th><th style="width:80px;">操作</th></tr></thead><tbody>';
                    testcases.forEach(function(tc, i) {
                        var envHtml = tc.env === 'dev' ? '<span class="env-badge dev">DEV</span>'
                            : tc.env === 'uat' ? '<span class="env-badge uat">UAT</span>'
                            : tc.env === 'pro' ? '<span class="env-badge pro">PRO</span>'
                            : '<span class="tag tag-primary">' + (tc.env||'-') + '</span>';
                        var tcStatus = tc.enabled === 1
                            ? '<span class="tag tag-success">启用</span>'
                            : '<span class="tag tag-danger">禁用</span>';
                        tcHtml += '<tr>' +
                            '<td style="color:var(--text-muted);">' + (i+1) + '</td>' +
                            '<td style="color:var(--text-primary);"><strong>' + escHtml(tc.caseTitle) + '</strong></td>' +
                            '<td>' + envHtml + '</td>' +
                            '<td style="text-align:center;color:var(--text-secondary);">' + (tc.sortOrder||0) + '</td>' +
                            '<td>' + tcStatus + '</td>' +
                            '<td><button class="action-btn edit" onclick="runOnlineTest(' + tc.id + ',\'' + escHtml(tc.caseTitle) + '\',\'' + (tc.env||'dev') + '\')" title="在线测试"><i class="fas fa-play"></i> 测试</button></td></tr>';
                    });
                    tcHtml += '</tbody></table>';
                }

                var content = '<div style="padding:20px 24px;max-height:500px;overflow-y:auto;">' + infoHtml + urlHtml + tcHtml + '</div>';
                openLayer('接口详情：' + escHtml(iface.apiName), content, ['780px', '520px'], null);
            }
        });
    }

    /** 打开新增/编辑弹窗 */
    function showInterfaceForm(data) {
        var isEdit = !!data;
        var title = isEdit ? '编辑接口' : '新增接口';
        var d = data || {};

        var selStyle = 'width:100%;height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 10px;font-size:14px;background:var(--input-bg);color:var(--text-primary);box-sizing:border-box;outline:none;';
        var inpStyle = 'width:100%;height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 12px;font-size:14px;background:var(--input-bg);color:var(--text-primary);box-sizing:border-box;outline:none;transition:border-color .3s;';
        var rowStyle = 'display:flex;align-items:center;margin-bottom:14px;';
        var lblStyle = 'width:85px;font-size:14px;color:var(--text-secondary);flex-shrink:0;';
        var wrapStyle = 'flex:1;';

        var html =
            '<div style="padding:20px 24px;">' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-tag" style="color:#667eea;width:18px;"></i> 名称</div><div style="' + wrapStyle + '"><input id="f_name" style="' + inpStyle + '" value="' + escHtml(d.apiName||'') + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-info-circle" style="color:#667eea;width:18px;"></i> 描述</div><div style="' + wrapStyle + '"><input id="f_info" style="' + inpStyle + '" value="' + escHtml(d.apiInfo||'') + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"><div class="field-hint">接口描述，仅做说明，不参与执行逻辑</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-code" style="color:#667eea;width:18px;"></i> 方法</div><div style="' + wrapStyle + '"><select id="f_method" style="' + selStyle + '">' +
            ['GET','POST','PUT','DELETE','PATCH'].map(function(m) { return '<option value="' + m + '"' + (d.method===m?'selected':'') + '>' + m + '</option>'; }).join('') +
            '</select></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-server" style="color:#667eea;width:18px;"></i> DEV</div><div style="' + wrapStyle + '"><input id="f_urlDev" style="' + inpStyle + '" value="' + escHtml(d.urlDev||'') + '" placeholder="https://dev-api.example.com/..." onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"><div class="field-hint">开发环境地址，env=dev 时使用</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-server" style="color:#667eea;width:18px;"></i> UAT</div><div style="' + wrapStyle + '"><input id="f_urlUat" style="' + inpStyle + '" value="' + escHtml(d.urlUat||'') + '" placeholder="https://uat-api.example.com/..." onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"><div class="field-hint">测试环境地址，env=uat 时使用</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-server" style="color:#667eea;width:18px;"></i> PRO</div><div style="' + wrapStyle + '"><input id="f_urlPro" style="' + inpStyle + '" value="' + escHtml(d.urlPro||'') + '" placeholder="https://api.example.com/..." onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"><div class="field-hint">生产环境地址，env=pro 时使用</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-cog" style="color:#667eea;width:18px;"></i> 服务编码</div><div style="' + wrapStyle + '"><input id="f_serviceCode" style="' + inpStyle + '" value="' + escHtml(d.serviceCode||'') + '" placeholder="如 auto" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"><div class="field-hint">按服务过滤用例；特殊值 <code>auto</code> 表示被自动加载执行</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-toggle-on" style="color:#667eea;width:18px;"></i> 状态</div><div style="' + wrapStyle + '"><select id="f_enabled" style="' + selStyle + '"><option value="1"' + (d.enabled===1||d.enabled==null?'selected':'') + '>启用</option><option value="0"' + (d.enabled===0?'selected':'') + '>禁用</option></select><div class="field-hint">禁用后该接口下所有用例都不会执行</div></div></div>' +
            '<div style="margin-top:6px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;"><div style="font-size:12px;color:var(--text-muted);"><i class="fas fa-lightbulb" style="color:#f9a825;margin-right:4px;"></i> <strong>提示：</strong>如果当前环境对应的 URL 为空，该接口下的用例会被跳过。至少填写一个环境的 URL。详细格式指引请查看左侧菜单「用例格式指引」。</div></div>' +
            '</div>';

        openLayer(title, html, ['560px', '560px'], function(index) {
            var obj = {
                apiName: document.getElementById('f_name').value,
                apiInfo: document.getElementById('f_info').value,
                method: document.getElementById('f_method').value,
                urlDev: document.getElementById('f_urlDev').value,
                urlUat: document.getElementById('f_urlUat').value,
                urlPro: document.getElementById('f_urlPro').value,
                serviceCode: document.getElementById('f_serviceCode').value,
                enabled: parseInt(document.getElementById('f_enabled').value)
            };
            var errors = validateInterface(obj);
            if (errors.length > 0) {
                layer.msg('<i class="fas fa-exclamation-triangle" style="color:#ef5350;"></i> ' + errors.join('；'), {icon:2, time:3000});
                return;
            }
            if (isEdit) obj.id = d.id;
            ajax({
                url: '/api/interface', method: isEdit ? 'PUT' : 'POST',
                contentType: 'application/json', data: JSON.stringify(obj),
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('保存成功！', {icon:1}); loadInterface(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    function editInterface(id) {
        ajax({ url: '/api/interface/' + id, success: function(res) { if (res.code === 200) showInterfaceForm(res.data); } });
    }

    function deleteInterface(id) {
        layer.confirm('<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;margin-right:8px;"></i> 确定删除该接口？<br><small style="color:#999;">关联的测试用例也会被删除</small>', { icon: 3, title: '确认' }, function(index) {
            ajax({ url: '/api/interface/' + id, method: 'DELETE',
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('已删除', {icon:1}); loadInterface(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    /** HTML 转义（使用 index.html 全局定义） */
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /** 在线测试 */
    function runOnlineTest(testcaseId, caseTitle, env) {
        var loadingIdx = layer.load(1, {shade: [0.2, '#000']});
        ajax({
            url: '/api/online-test/execute',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ testcaseId: testcaseId, env: env }),
            success: function(res) {
                layer.close(loadingIdx);
                if (res.code !== 200) { layer.msg(res.msg || '测试失败', {icon:2}); return; }
                showTestResult(res.data, caseTitle);
            },
            error: function() {
                layer.close(loadingIdx);
                layer.msg('请求异常，请检查网络', {icon:2});
            }
        });
    }

    /** 展示测试结果弹窗 */
    function showTestResult(data, caseTitle) {
        var statusColor = data.success ? '#66bb6a' : '#ef5350';
        var statusIcon = data.success ? 'fa-check-circle' : 'fa-times-circle';
        var statusText = data.success ? '成功' : '失败';

        var html =
            '<div style="padding:20px 24px;">' +
            '<div style="text-align:center;margin-bottom:16px;">' +
            '<div style="font-size:42px;color:' + statusColor + ';margin-bottom:8px;"><i class="fas ' + statusIcon + '"></i></div>' +
            '<h3 style="color:var(--text-primary);margin:0 0 4px;">测试' + statusText + '</h3>' +
            '<div style="color:var(--text-secondary);font-size:13px;">' + escHtml(caseTitle || '') + '</div>' +
            '</div>' +

            '<div style="display:flex;gap:12px;margin-bottom:16px;">' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">状态码</div>' +
            '<div style="font-size:20px;font-weight:700;color:' + statusColor + ';">' + (data.statusCode || '-') + '</div></div>' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">耗时</div>' +
            '<div style="font-size:20px;font-weight:700;color:var(--text-primary);">' + (data.durationMs || 0) + '<span style="font-size:12px;font-weight:400;">ms</span></div></div>' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">方法</div>' +
            '<div style="font-size:20px;font-weight:700;color:#667eea;">' + escHtml(data.requestMethod || '-') + '</div></div>' +
            '</div>' +

            '<div style="margin-bottom:12px;">' +
            '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-link" style="width:14px;"></i> 请求地址</div>' +
            '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--text-primary);">' + escHtml(data.requestUrl || '-') + '</div></div>';

        if (data.requestBody) {
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-paper-plane" style="width:14px;"></i> 请求数据</div>' +
                '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--text-secondary);max-height:100px;overflow-y:auto;">' + escHtml(data.requestBody) + '</div></div>';
        }

        if (data.assertResult) {
            var assertColor = data.assertResult.indexOf('✗') > -1 ? '#ef5350' : '#66bb6a';
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-clipboard-check" style="width:14px;"></i> 断言结果</div>' +
                '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;white-space:pre-wrap;color:' + assertColor + ';">' + escHtml(data.assertResult) + '</div></div>';
        }

        if (data.error) {
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:#ef5350;margin-bottom:4px;"><i class="fas fa-exclamation-triangle" style="width:14px;"></i> 错误信息</div>' +
                '<div style="background:rgba(239,83,80,0.08);border:1px solid rgba(239,83,80,0.2);border-radius:6px;padding:8px 12px;font-size:12px;color:#ef5350;">' + escHtml(data.error) + '</div></div>';
        }

        html += '<div style="margin-bottom:0;">' +
            '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">' +
            '<span><i class="fas fa-file-code" style="width:14px;"></i> 响应内容</span>' +
            '<button style="font-size:11px;color:#667eea;background:none;border:none;cursor:pointer;" onclick="copyTestResponse(this)"><i class="fas fa-copy"></i> 复制</button></div>' +
            '<pre id="testResponseBody" style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:10px 12px;font-size:12px;font-family:monospace;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;color:var(--text-secondary);margin:0;">' + formatJson(data.responseBody) + '</pre></div>';

        html += '</div>';

        layer.open({
            type: 1,
            title: '<i class="fas fa-vial" style="color:#667eea;"></i> 测试结果',
            area: ['640px', '560px'],
            content: html,
            shadeClose: true
        });
    }

    function formatJson(str) {
        if (!str) return '-';
        try {
            return escHtml(JSON.stringify(JSON.parse(str), null, 2));
        } catch(e) {
            return escHtml(str);
        }
    }

    function copyTestResponse(btn) {
        var el = document.getElementById('testResponseBody');
        if (el && navigator.clipboard) {
            navigator.clipboard.writeText(el.textContent).then(function() {
                layer.msg('已复制响应内容', {icon:1, time:1500});
            });
        }
    }
    </script>
