<div th:fragment="dify-page">
    <style>
        .example-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .example-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .example-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        .example-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.15);
        }
        .example-card:hover::before { transform: scaleX(1); }
        .example-card:active { transform: translateY(-1px) scale(0.98); }
        .example-card .card-icon {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(102,126,234,0.12);
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .example-card .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .example-card .card-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .example-card .card-tags {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .example-card .card-tags span {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(102,126,234,0.08);
            color: #667eea;
        }

        .dify-iframe-wrap {
            position: relative;
            width: 100%;
            height: calc(100vh - 280px);
            min-height: 500px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #fff;
        }
        .dify-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .dify-iframe-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-card, #fff);
            z-index: 1;
            transition: opacity 0.4s ease;
        }
        .dify-iframe-loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        .dify-iframe-loading .loader-ring {
            position: relative;
            width: 48px; height: 48px;
        }
        .dify-iframe-loading .loader-ring .ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #667eea;
            border-bottom-color: #764ba2;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .dify-iframe-loading .loader-ring .ring:nth-child(2) {
            width: 70%; height: 70%;
            top: 15%; left: 15%;
            border-top-color: #38ef7d;
            border-bottom-color: transparent;
            animation-direction: reverse;
            animation-duration: 0.8s;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dify-iframe-loading .loader-text {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted, #999);
            animation: textPulse 1.5s ease-in-out infinite;
        }
        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .prompt-dialog-content {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
            background: var(--input-bg, #f8f8f8);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary, #333);
            font-family: 'Consolas', 'Monaco', monospace;
            border: 1px solid var(--border-color, #e0e0e0);
        }
        .prompt-dialog-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .prompt-dialog-tags span {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            background: rgba(102,126,234,0.1);
            color: #667eea;
        }

        @media (max-width: 900px) {
            .example-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .dify-iframe-wrap {
                height: calc(100vh - 360px);
                min-height: 400px;
            }
        }
    </style>

    <!-- ===== 工具栏 ===== -->
    <div class="toolbar" style="margin-bottom:16px;">
        <div style="font-size:18px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px;">
            <i class="fas fa-robot" style="color:#667eea;"></i> Dify 工作流
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <a href="http://192.168.150.101:81/workflow/qPUHHJwWErWQokgJ" target="_blank"
               style="font-size:12px;color:#667eea;text-decoration:none;display:flex;align-items:center;gap:4px;">
                <i class="fas fa-external-link-alt"></i> 新窗口打开
            </a>
        </div>
    </div>

    <!-- ===== 示例提示词卡片 ===== -->
    <div class="card" style="margin-bottom:16px;">
        <div class="card-header" style="margin-bottom:12px;">
            <h3><i class="fas fa-lightbulb"></i> 示例提示词 — 点击查看详情</h3>
        </div>
        <div class="example-grid" id="exampleGrid"></div>
    </div>

    <!-- ===== Dify 调试页面（iframe 嵌入） ===== -->
    <div class="card" style="margin-bottom:0;">
        <div class="card-header" style="margin-bottom:12px;">
            <h3><i class="fas fa-terminal"></i> 工作流调试</h3>
            <span style="font-size:12px;color:var(--text-muted);">直接在下方 Dify 页面中输入提示词并执行</span>
        </div>
        <div class="dify-iframe-wrap">
            <div class="dify-iframe-loading" id="iframeLoading">
                <div class="loader-ring"><div class="ring"></div><div class="ring"></div></div>
                <div class="loader-text">正在加载 Dify 工作流页面...</div>
            </div>
            <iframe
                id="difyIframe"
                src="http://192.168.150.101:81/workflow/qPUHHJwWErWQokgJ"
                allow="clipboard-read; clipboard-write"
                onload="document.getElementById('iframeLoading').classList.add('hide')"
            ></iframe>
        </div>
    </div>

    <script>
var examplePrompts = [
    {
        icon: 'fa-plug',
        title: '为登录接口生成测试用例',
        desc: '为 POST /api/auth/login 生成完整测试用例，包含正常登录、密码错误、用户不存在、参数缺失等场景及 JSON 断言规则',
        tags: ['登录', 'POST', '断言'],
        prompt: '请为以下登录接口生成完整的测试用例：\n接口：POST /api/auth/login\n请求体：{"username": "admin", "password": "123456"}\n\n要求覆盖以下场景：\n1. 正常登录（用户名密码正确）\n2. 密码错误\n3. 用户不存在\n4. 参数缺失（缺username、缺password、都缺）\n5. 特殊字符输入\n\n为每个场景给出：\n- 用例标题\n- 请求数据（JSON）\n- JSON Path 断言规则\n- 期望结果'
    },
    {
        icon: 'fa-layer-group',
        title: '批量生成测试数据',
        desc: '为注册接口生成 10 条测试数据，覆盖正常值、边界值、异常值',
        tags: ['批量', 'POST', '边界值'],
        prompt: '请为以下注册接口批量生成 10 条测试数据：\n接口：POST /api/user/register\n字段说明：\n- username：字符串，3-20 个字符\n- password：字符串，6-18 个字符\n- email：邮箱格式\n- age：整数，18-100\n\n要求：\n1. 3 条正常值（合法数据）\n2. 3 条边界值（username=3字符/20字符、age=18/100）\n3. 4 条异常值（username超长、password过短、email格式错误、age超出范围）\n\n以 JSON 数组格式输出，每条数据包含字段说明。'
    },
    {
        icon: 'fa-code',
        title: '编写 JSONPath 断言',
        desc: '为 GET /api/user/profile 编写 JSONPath 断言规则',
        tags: ['GET', 'JSONPath', '断言'],
        prompt: '请为以下接口编写 JSONPath 断言规则：\n接口：GET /api/user/profile\n返回格式：{"code": 0, "data": {"id": 1, "name": "张三", "role": "admin", "permissions": ["read", "write"]}}\n\n需要断言以下内容：\n1. code == 0\n2. data.id > 0\n3. data.name 不为空\n4. data.role 为 "admin"\n5. data.permissions 包含 "read"\n6. data.permissions 是数组且长度 >= 2\n\n输出格式为 JSON 数组，每个元素包含断言路径、断言类型（值/存在/类型/长度）和期望值。'
    },
    {
        icon: 'fa-flask',
        title: '生成完整接口测试脚本',
        desc: '为订单创建接口生成完整的自动化测试方案',
        tags: ['完整流程', 'POST', '自动化'],
        prompt: '请为以下订单创建接口生成完整的接口自动化测试方案：\n接口：POST /api/order/create\n请求头：Content-Type: application/json\n请求体：\n{\n  "userId": 1001,\n  "productId": 2001,\n  "quantity": 2,\n  "address": "北京市朝阳区"\n}\n\n请生成：\n1. 接口定义信息（名称、方法、URL、请求头）\n2. 3 个测试用例：正常下单、数量为0（异常）、地址为空（异常）\n3. 每个用例的 JSON 断言规则\n4. 执行顺序建议'
    },
    {
        icon: 'fa-pen-ruler',
        title: 'JSON Schema 校验',
        desc: '为复杂嵌套 JSON 响应编写校验规则',
        tags: ['Schema', '校验', '嵌套'],
        prompt: '请为以下 API 响应编写完整的校验规则：\n接口：POST /api/order/list\n响应格式：\n{\n  "code": 0,\n  "message": "success",\n  "data": {\n    "total": 100,\n    "page": 1,\n    "size": 10,\n    "list": [\n      {\n        "orderId": "ORD20240101001",\n        "status": "paid",\n        "amount": 99.9,\n        "items": [{"name": "商品A", "price": 49.95, "count": 2}]\n      }\n    ]\n  }\n}\n\n校验要求：\n1. code 必须为 0\n2. message 为 "success"\n3. data.total 是数字且 >= 0\n4. data.page 是数字且 >= 1\n5. data.list 是数组\n6. list 中每个元素的 orderId 以 "ORD" 开头\n7. status 枚举值为 ["paid", "unpaid", "cancelled"]\n8. amount 是浮点数\n9. items 中每个元素的 count 是整数 >= 1'
    },
    {
        icon: 'fa-arrows-spin',
        title: '接口依赖与链路测试',
        desc: '模拟用户完整操作链路：登录 → 获取信息 → 创建订单 → 查询',
        tags: ['链路', '多接口', '依赖'],
        prompt: '请为以下接口链路生成集成测试方案：\n步骤1：POST /api/auth/login → 获取 token\n步骤2：GET /api/user/profile（依赖 token）→ 获取用户信息\n步骤3：POST /api/order/create（依赖 userId）→ 创建订单\n步骤4：GET /api/order/{orderId}（依赖 orderId）→ 查询订单详情\n\n要求：\n1. 设计测试数据使上一步的输出作为下一步的输入\n2. 每个步骤给出请求数据和断言规则\n3. 说明数据流转关系（token → userId → orderId）\n4. 给出异常链路测试（如 token 过期后访问需鉴权接口）'
    }
];

if (typeof escHtml !== 'function') {
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
}

function initExampleCards() {
    var grid = document.getElementById('exampleGrid');
    if (!grid) return;
    var html = '';
    for (var i = 0; i < examplePrompts.length; i++) {
        var p = examplePrompts[i];
        var tagsHtml = '';
        for (var j = 0; j < p.tags.length; j++) {
            tagsHtml += '<span>' + escHtml(p.tags[j]) + '</span>';
        }
        html += '<div class="example-card" onclick="showPromptDetail(' + i + ')" title="点击查看提示词详情">' +
            '<div class="card-icon"><i class="fas ' + p.icon + '"></i></div>' +
            '<div class="card-title">' + escHtml(p.title) + '</div>' +
            '<div class="card-desc">' + escHtml(p.desc) + '</div>' +
            '<div class="card-tags">' + tagsHtml + '</div>' +
            '</div>';
    }
    grid.innerHTML = html;
}

function showPromptDetail(index) {
    var p = examplePrompts[index];
    if (!p) return;

    var tagsHtml = '';
    for (var j = 0; j < p.tags.length; j++) {
        tagsHtml += '<span>' + escHtml(p.tags[j]) + '</span>';
    }

    var content = '<div style="padding:8px 0;">' +
        '<div class="prompt-dialog-tags">' + tagsHtml + '</div>' +
        '<div class="prompt-dialog-content">' + escHtml(p.prompt) + '</div>' +
        '<div style="margin-top:12px;font-size:12px;color:var(--text-muted);">' +
        '<i class="fas fa-info-circle"></i> 复制上方提示词，粘贴到下方 Dify 调试页面的输入框中执行' +
        '</div></div>';

    layer.open({
        type: 1,
        title: '<i class="fas ' + p.icon + '" style="color:#667eea;margin-right:6px;"></i>' + escHtml(p.title),
        area: ['560px', 'auto'],
        maxHeight: 520,
        shadeClose: true,
        content: content
    });
}

window.addEventListener('load', function() {
    initExampleCards();
});
    </script>
</div>
