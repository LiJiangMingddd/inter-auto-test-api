<!DOCTYPE html>
<!-- ============================================================
     用例管理页面碎片
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="testcase-page">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-vial"></i> 用例列表</h3>
            <div class="toolbar">
                <div class="search-bar">
                    <input class="layui-input" id="tcKeyword" placeholder="按用例标题搜索..." style="width:200px;">
                    <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="loadTestcase(1)">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <button class="layui-btn layui-btn-sm" onclick="showTestcaseForm()">
                    <i class="fas fa-plus"></i> 新增用例
                </button>
            </div>
        </div>
        <table class="layui-table" lay-skin="line">
            <thead>
            <tr>
                <th>用例标题</th>
                <th style="width:80px;">环境</th>
                <th style="width:60px;">排序</th>
                <th style="width:80px;">状态</th>
                <th style="width:150px;">操作</th>
            </tr>
            </thead>
            <tbody id="testcaseTbody"></tbody>
        </table>
        <div id="testcasePage" style="text-align:center;padding:10px 0;"></div>
    </div>

    <script>
    // ============================================================
    //  用例 CRUD
    // ============================================================

    /** 加载用例列表 */
    function loadTestcase(page) {
        var keyword = document.getElementById('tcKeyword') ? document.getElementById('tcKeyword').value : '';
        var url = '/api/testcase/page?pageNum=' + page + '&pageSize=10';
        if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
        ajax({
            url: url,
            success: function(res) {
                if (res.code !== 200) { layer.msg(res.msg); return; }
                var data = res.data, html = '';
                (data.records || []).forEach(function(item, i) {
                    var statusHtml = item.enabled === 1
                        ? '<span class="tag tag-success"><i class="fas fa-check-circle"></i> 启用</span>'
                        : '<span class="tag tag-danger"><i class="fas fa-times-circle"></i> 禁用</span>';
                    var envHtml = item.env === 'dev' ? '<span class="env-badge dev"><i class="fas fa-code-branch"></i> DEV</span>'
                        : item.env === 'uat' ? '<span class="env-badge uat"><i class="fas fa-code-branch"></i> UAT</span>'
                        : item.env === 'pro' ? '<span class="env-badge pro"><i class="fas fa-code-branch"></i> PRO</span>'
                        : '<span class="tag tag-primary">' + (item.env||'DEV') + '</span>';
                    html += '<tr class="table-row-enter" style="animation-delay:' + (i * 0.05) + 's">' +
                        '<td><strong>' + escHtml(item.caseTitle) + '</strong></td>' +
                        '<td>' + envHtml + '</td>' +
                        '<td>' + (item.sortOrder||0) + '</td>' +
                        '<td>' + statusHtml + '</td>' +
                        '<td>' +
                        '<button class="action-btn edit" onclick="editTestcase(' + item.id + ')"><i class="fas fa-pen"></i> 编辑</button> ' +
                        '<button class="action-btn danger" onclick="deleteTestcase(' + item.id + ')"><i class="fas fa-trash"></i> 删除</button>' +
                        '</td></tr>';
                });
                if (!html) {
                    html = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-flask"></i><p>暂无用例数据</p></div></td></tr>';
                }
                document.getElementById('testcaseTbody').innerHTML = html;
                renderPager('testcasePage', data, loadTestcase);
            }
        });
    }

    /** 打开用例表单弹窗 */
    function showTestcaseForm(data) {
        var isEdit = !!data;
        var title = isEdit ? '编辑用例' : '新增用例';
        var d = data || {};

        var selStyle = 'width:100%;height:38px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:0 10px;font-size:14px;background:rgba(255,255,255,0.06);color:#e0e0f0;box-sizing:border-box;outline:none;';
        var inpStyle = 'width:100%;height:38px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:0 12px;font-size:14px;background:rgba(255,255,255,0.06);color:#e0e0f0;box-sizing:border-box;outline:none;transition:border-color .3s;';
        var taStyle = 'width:100%;min-height:70px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:10px 12px;font-size:13px;font-family:monospace;background:rgba(255,255,255,0.06);color:#c0c8d8;box-sizing:border-box;outline:none;resize:vertical;transition:border-color .3s;';
        var rowStyle = 'display:flex;align-items:flex-start;margin-bottom:12px;';
        var lblStyle = 'width:85px;font-size:14px;color:#8899b0;flex-shrink:0;padding-top:8px;';
        var wrapStyle = 'flex:1;';

        var html =
            '<div style="padding:18px 22px;">' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-link" style="color:#667eea;width:18px;"></i> 接口ID</div><div style="' + wrapStyle + '"><input id="f_tc_interfaceId" style="' + inpStyle + '" value="' + (d.interfaceId||'') + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.15)\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-heading" style="color:#667eea;width:18px;"></i> 标题</div><div style="' + wrapStyle + '"><input id="f_tc_title" style="' + inpStyle + '" value="' + escHtml(d.caseTitle||'') + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.15)\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-code" style="color:#667eea;width:18px;"></i> 请求数据</div><div style="' + wrapStyle + '"><textarea id="f_tc_data" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.15)\'">' + escHtml(d.caseData||'') + '</textarea></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-check-double" style="color:#667eea;width:18px;"></i> 断言规则</div><div style="' + wrapStyle + '"><textarea id="f_tc_rules" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.15)\'">' + escHtml(d.checkRules||'') + '</textarea></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-bullseye" style="color:#667eea;width:18px;"></i> 期望结果</div><div style="' + wrapStyle + '"><textarea id="f_tc_expected" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.15)\'">' + escHtml(d.expectedResults||'') + '</textarea></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-globe" style="color:#667eea;width:18px;"></i> 环境</div><div style="' + wrapStyle + '"><select id="f_tc_env" style="' + selStyle + '">' +
            '<option value="dev"' + (!d.env||d.env==='dev'?'selected':'') + '>DEV</option>' +
            '<option value="uat"' + (d.env==='uat'?'selected':'') + '>UAT</option>' +
            '<option value="pro"' + (d.env==='pro'?'selected':'') + '>PRO</option>' +
            '</select></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-sort-numeric-up" style="color:#667eea;width:18px;"></i> 排序</div><div style="' + wrapStyle + '"><input id="f_tc_sort" style="' + inpStyle + '" value="' + (d.sortOrder||0) + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'#d9d9d9\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-toggle-on" style="color:#667eea;width:18px;"></i> 状态</div><div style="' + wrapStyle + '"><select id="f_tc_enabled" style="' + selStyle + '"><option value="1"' + (d.enabled!==0?'selected':'') + '>启用</option><option value="0"' + (d.enabled===0?'selected':'') + '>禁用</option></select></div></div>' +
            '</div>';

        openLayer(title, html, ['620px', '520px'], function(index) {
            var obj = {
                interfaceId: parseInt(document.getElementById('f_tc_interfaceId').value) || 0,
                caseTitle: document.getElementById('f_tc_title').value,
                caseData: document.getElementById('f_tc_data').value,
                checkRules: document.getElementById('f_tc_rules').value,
                expectedResults: document.getElementById('f_tc_expected').value,
                env: document.getElementById('f_tc_env').value,
                sortOrder: parseInt(document.getElementById('f_tc_sort').value) || 0,
                enabled: parseInt(document.getElementById('f_tc_enabled').value)
            };
            if (isEdit) obj.id = d.id;
            ajax({
                url: '/api/testcase', method: isEdit ? 'PUT' : 'POST',
                contentType: 'application/json', data: JSON.stringify(obj),
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('保存成功！', {icon:1}); loadTestcase(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    function editTestcase(id) {
        ajax({ url: '/api/testcase/' + id, success: function(res) { if (res.code === 200) showTestcaseForm(res.data); } });
    }

    function deleteTestcase(id) {
        layer.confirm('<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i> 确定删除该用例？', { icon: 3, title: '确认' }, function(index) {
            ajax({ url: '/api/testcase/' + id, method: 'DELETE',
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('已删除', {icon:1}); loadTestcase(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }
</script>
</div>
