<!DOCTYPE html>
<!-- ============================================================
     用例管理页面碎片
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="testcase-page">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-vial"></i> 用例列表</h3>
            <div class="toolbar">
                <div class="search-bar">
                    <input class="layui-input" id="tcKeyword" placeholder="按用例标题搜索..." style="width:180px;">
                    <select id="tcEnv" style="height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 8px;font-size:13px;background:var(--input-bg);color:var(--text-primary);outline:none;cursor:pointer;">
                        <option value="">全部环境</option>
                        <option value="dev">DEV</option>
                        <option value="uat">UAT</option>
                        <option value="pro">PRO</option>
                    </select>
                    <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="loadTestcase(1)">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <button class="layui-btn layui-btn-sm" onclick="showTestcaseForm()">
                    <i class="fas fa-plus"></i> 新增用例
                </button>
            </div>
        </div>
        <table class="layui-table" lay-skin="line" style="table-layout:auto;">
            <thead>
            <tr>
                <th style="min-width:120px;">用例标题</th>
                <th style="width:70px;">环境</th>
                <th style="width:55px;">排序</th>
                <th style="width:70px;">状态</th>
                <th class="ops-cell">操作</th>
            </tr>
            </thead>
            <tbody id="testcaseTbody"></tbody>
        </table>
        <div id="testcasePage" style="text-align:center;padding:10px 0;"></div>
    </div>

    <script>
    // ============================================================
    //  用例 CRUD
    // ============================================================

    /** 加载用例列表 */
    function loadTestcase(page) {
        var keyword = document.getElementById('tcKeyword') ? document.getElementById('tcKeyword').value : '';
        var env = document.getElementById('tcEnv') ? document.getElementById('tcEnv').value : '';
        var url = '/api/testcase/page?pageNum=' + page + '&pageSize=10';
        if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
        if (env) url += '&env=' + encodeURIComponent(env);
        ajax({
            url: url,
            success: function(res) {
                if (res.code !== 200) { layer.msg(res.msg); return; }
                var data = res.data, html = '';
                (data.records || []).forEach(function(item, i) {
                    var statusHtml = item.enabled === 1
                        ? '<span class="tag tag-success"><i class="fas fa-check-circle"></i> 启用</span>'
                        : '<span class="tag tag-danger"><i class="fas fa-times-circle"></i> 禁用</span>';
                    var envHtml = item.env === 'dev' ? '<span class="env-badge dev"><i class="fas fa-code-branch"></i> DEV</span>'
                        : item.env === 'uat' ? '<span class="env-badge uat"><i class="fas fa-code-branch"></i> UAT</span>'
                        : item.env === 'pro' ? '<span class="env-badge pro"><i class="fas fa-code-branch"></i> PRO</span>'
                        : '<span class="tag tag-primary">' + (item.env||'DEV') + '</span>';
                    var tcErrors = validateTestcase(item);
                    var warnHtml = tcErrors.length > 0 ? ' <span class="format-warning">' + buildWarnDot(tcErrors) + '</span>' : '';
                    html += '<tr class="table-row-enter" style="animation-delay:' + (i * 0.05) + 's">' +
                        '<td><span class="cell-tip"><strong>' + escHtml(item.caseTitle) + '</strong><span class="tip-content">' + escHtml(item.caseTitle) + '</span></span>' + warnHtml + '</td>' +
                        '<td>' + envHtml + '</td>' +
                        '<td>' + (item.sortOrder||0) + '</td>' +
                        '<td>' + statusHtml + '</td>' +
                        '<td class="ops-cell">' +
                        '<button class="action-btn perm" onclick="runOnlineTest(' + item.id + ',\'' + escHtml(item.caseTitle).replace(/'/g, "\\'") + '\',\'' + (item.env||'dev') + '\')" title="在线测试"><i class="fas fa-play"></i> 测试</button>' +
                        '<button class="action-btn edit" onclick="editTestcase(' + item.id + ')"><i class="fas fa-pen"></i> 编辑</button>' +
                        '<button class="action-btn danger" onclick="deleteTestcase(' + item.id + ')"><i class="fas fa-trash"></i> 删除</button>' +
                        '</td></tr>';
                });
                if (!html) {
                    html = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-flask"></i><p>暂无用例数据</p></div></td></tr>';
                }
                document.getElementById('testcaseTbody').innerHTML = html;
                renderPager('testcasePage', data, loadTestcase);
            }
        });
    }

    /** 打开用例表单弹窗 */
    function showTestcaseForm(data) {
        var isEdit = !!data;
        var title = isEdit ? '编辑用例' : '新增用例';
        var d = data || {};

        var selStyle = 'width:100%;height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 10px;font-size:14px;background:var(--input-bg);color:var(--text-primary);box-sizing:border-box;outline:none;';
        var inpStyle = 'width:100%;height:38px;border:1px solid var(--border-color);border-radius:6px;padding:0 12px;font-size:14px;background:var(--input-bg);color:var(--text-primary);box-sizing:border-box;outline:none;transition:border-color .3s;';
        var taStyle = 'width:100%;min-height:70px;border:1px solid var(--border-color);border-radius:6px;padding:10px 12px;font-size:13px;font-family:monospace;background:var(--input-bg);color:var(--text-secondary);box-sizing:border-box;outline:none;resize:vertical;transition:border-color .3s;';
        var rowStyle = 'display:flex;align-items:flex-start;margin-bottom:12px;';
        var lblStyle = 'width:85px;font-size:14px;color:var(--text-secondary);flex-shrink:0;padding-top:8px;';
        var wrapStyle = 'flex:1;';

        var html =
            '<div style="padding:18px 22px;">' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-link" style="color:#667eea;width:18px;"></i> 接口ID</div><div style="' + wrapStyle + '"><input id="f_tc_interfaceId" type="hidden" value="' + (d.interfaceId||'') + '"><span style="display:inline-flex;align-items:center;height:38px;padding:0 12px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:6px;font-size:14px;color:var(--text-muted);min-width:60px;">' + (d.interfaceId||'—') + '</span><div class="field-hint">接口ID 由系统关联，不可修改</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-heading" style="color:#667eea;width:18px;"></i> 标题</div><div style="' + wrapStyle + '"><input id="f_tc_title" style="' + inpStyle + '" value="' + escHtml(d.caseTitle||'') + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-code" style="color:#667eea;width:18px;"></i> 请求数据</div><div style="' + wrapStyle + '"><textarea id="f_tc_data" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'" oninput="onCaseDataInput()">' + escHtml(d.caseData||'') + '</textarea><div id="f_tc_data_hint" class="field-hint">JSON 格式，如 <code>{"username":"admin"}</code>；GET 请求作为查询参数，POST 作为请求体。支持 <code>#now#</code> <code>#faker_name#</code> 等占位符</div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-check-double" style="color:#667eea;width:18px;"></i> 断言规则</div><div style="' + wrapStyle + '"><textarea id="f_tc_rules" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'" oninput="onCheckRulesInput()">' + escHtml(d.checkRules||'') + '</textarea><div id="f_tc_rules_hint" class="field-hint">JSON 数组格式，如 <code>[{"json":"$.status"}]</code>。支持5种断言：<code>json</code> <code>exist</code> <code>not_exist</code> <code>sql</code> <code>status_code</code></div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-bullseye" style="color:#667eea;width:18px;"></i> 期望结果</div><div style="' + wrapStyle + '"><textarea id="f_tc_expected" style="' + taStyle + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'" oninput="onExpectedInput()">' + escHtml(d.expectedResults||'') + '</textarea><div id="f_tc_expected_hint" class="field-hint">JSON 数组，与断言规则<strong>一一对应</strong>（数量相同、位置对齐），如 <code>["1"]</code></div></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-globe" style="color:#667eea;width:18px;"></i> 环境</div><div style="' + wrapStyle + '"><select id="f_tc_env" style="' + selStyle + '">' +
            '<option value="dev"' + (!d.env||d.env==='dev'?'selected':'') + '>DEV</option>' +
            '<option value="uat"' + (d.env==='uat'?'selected':'') + '>UAT</option>' +
            '<option value="pro"' + (d.env==='pro'?'selected':'') + '>PRO</option>' +
            '</select></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-sort-numeric-up" style="color:#667eea;width:18px;"></i> 排序</div><div style="' + wrapStyle + '"><input id="f_tc_sort" style="' + inpStyle + '" value="' + (d.sortOrder||0) + '" onfocus="this.style.borderColor=\'#667eea\'" onblur="this.style.borderColor=\'var(--border-color)\'"></div></div>' +
            '<div style="' + rowStyle + '"><div style="' + lblStyle + '"><i class="fas fa-toggle-on" style="color:#667eea;width:18px;"></i> 状态</div><div style="' + wrapStyle + '"><select id="f_tc_enabled" style="' + selStyle + '"><option value="1"' + (d.enabled!==0?'selected':'') + '>启用</option><option value="0"' + (d.enabled===0?'selected':'') + '>禁用</option></select></div></div>' +
            '</div>';

        openLayer(title, html, ['640px', '600px'], function(index) {
            var obj = {
                interfaceId: parseInt(document.getElementById('f_tc_interfaceId').value) || 0,
                caseTitle: document.getElementById('f_tc_title').value,
                caseData: document.getElementById('f_tc_data').value,
                checkRules: document.getElementById('f_tc_rules').value,
                expectedResults: document.getElementById('f_tc_expected').value,
                env: document.getElementById('f_tc_env').value,
                sortOrder: parseInt(document.getElementById('f_tc_sort').value) || 0,
                enabled: parseInt(document.getElementById('f_tc_enabled').value)
            };
            var errors = validateTestcase(obj);
            if (errors.length > 0) {
                layer.msg('<i class="fas fa-exclamation-triangle" style="color:#ef5350;"></i> ' + errors.join('；'), {icon:2, time:3000});
                return;
            }
            if (isEdit) obj.id = d.id;
            ajax({
                url: '/api/testcase', method: isEdit ? 'PUT' : 'POST',
                contentType: 'application/json', data: JSON.stringify(obj),
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('保存成功！', {icon:1}); loadTestcase(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    function editTestcase(id) {
        ajax({ url: '/api/testcase/' + id, success: function(res) { if (res.code === 200) showTestcaseForm(res.data); } });
    }

    function deleteTestcase(id) {
        layer.confirm('<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i> 确定删除该用例？', { icon: 3, title: '确认' }, function(index) {
            ajax({ url: '/api/testcase/' + id, method: 'DELETE',
                success: function(res) {
                    if (res.code === 200) { layer.close(index); layer.msg('已删除', {icon:1}); loadTestcase(1); }
                    else { layer.msg(res.msg, {icon:2}); }
                }
            });
        });
    }

    function runOnlineTest(testcaseId, caseTitle, env) {
        var loadingIdx = layer.load(1, {shade: [0.2, '#000']});
        ajax({
            url: '/api/online-test/execute',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ testcaseId: testcaseId, env: env }),
            success: function(res) {
                layer.close(loadingIdx);
                if (res.code !== 200) { layer.msg(res.msg || '测试失败', {icon:2}); return; }
                showTestResult(res.data, caseTitle);
            },
            error: function() {
                layer.close(loadingIdx);
                layer.msg('请求异常，请检查网络', {icon:2});
            }
        });
    }

    function showTestResult(data, caseTitle) {
        var statusColor = data.success ? '#66bb6a' : '#ef5350';
        var statusIcon = data.success ? 'fa-check-circle' : 'fa-times-circle';
        var statusText = data.success ? '成功' : '失败';

        var html =
            '<div style="padding:20px 24px;">' +
            '<div style="text-align:center;margin-bottom:16px;">' +
            '<div style="font-size:42px;color:' + statusColor + ';margin-bottom:8px;"><i class="fas ' + statusIcon + '"></i></div>' +
            '<h3 style="color:var(--text-primary);margin:0 0 4px;">测试' + statusText + '</h3>' +
            '<div style="color:var(--text-secondary);font-size:13px;">' + escHtml(caseTitle || '') + '</div>' +
            '</div>' +

            '<div style="display:flex;gap:12px;margin-bottom:16px;">' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">状态码</div>' +
            '<div style="font-size:20px;font-weight:700;color:' + statusColor + ';">' + (data.statusCode || '-') + '</div></div>' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">耗时</div>' +
            '<div style="font-size:20px;font-weight:700;color:var(--text-primary);">' + (data.durationMs || 0) + '<span style="font-size:12px;font-weight:400;">ms</span></div></div>' +
            '<div style="flex:1;background:var(--bg-card);border-radius:8px;padding:10px 14px;border:1px solid var(--border-color);text-align:center;">' +
            '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">方法</div>' +
            '<div style="font-size:20px;font-weight:700;color:#667eea;">' + escHtml(data.requestMethod || '-') + '</div></div>' +
            '</div>' +

            '<div style="margin-bottom:12px;">' +
            '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-link" style="width:14px;"></i> 请求地址</div>' +
            '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--text-primary);">' + escHtml(data.requestUrl || '-') + '</div></div>';

        if (data.requestBody) {
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-paper-plane" style="width:14px;"></i> 请求数据</div>' +
                '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--text-secondary);max-height:100px;overflow-y:auto;">' + escHtml(data.requestBody) + '</div></div>';
        }

        if (data.assertResult) {
            var assertColor = data.assertResult.indexOf('✗') > -1 ? '#ef5350' : '#66bb6a';
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><i class="fas fa-clipboard-check" style="width:14px;"></i> 断言结果</div>' +
                '<div style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;white-space:pre-wrap;color:' + assertColor + ';">' + escHtml(data.assertResult) + '</div></div>';
        }

        if (data.error) {
            html += '<div style="margin-bottom:12px;">' +
                '<div style="font-size:12px;color:#ef5350;margin-bottom:4px;"><i class="fas fa-exclamation-triangle" style="width:14px;"></i> 错误信息</div>' +
                '<div style="background:rgba(239,83,80,0.08);border:1px solid rgba(239,83,80,0.2);border-radius:6px;padding:8px 12px;font-size:12px;color:#ef5350;">' + escHtml(data.error) + '</div></div>';
        }

        html += '<div style="margin-bottom:0;">' +
            '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">' +
            '<span><i class="fas fa-file-code" style="width:14px;"></i> 响应内容</span>' +
            '<button style="font-size:11px;color:#667eea;background:none;border:none;cursor:pointer;" onclick="copyTestResponse(this)"><i class="fas fa-copy"></i> 复制</button></div>' +
            '<pre id="testResponseBody" style="background:var(--input-bg);border:1px solid var(--border-color);border-radius:6px;padding:10px 12px;font-size:12px;font-family:monospace;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;color:var(--text-secondary);margin:0;">' + formatJson(data.responseBody) + '</pre></div>';

        html += '</div>';

        layer.open({
            type: 1,
            title: '<i class="fas fa-vial" style="color:#667eea;"></i> 测试结果',
            area: ['640px', '560px'],
            content: html,
            shadeClose: true
        });
    }

    function formatJson(str) {
        if (!str) return '-';
        try {
            return escHtml(JSON.stringify(JSON.parse(str), null, 2));
        } catch(e) {
            return escHtml(str);
        }
    }

    function copyTestResponse(btn) {
        var el = document.getElementById('testResponseBody');
        if (el && navigator.clipboard) {
            navigator.clipboard.writeText(el.textContent).then(function() {
                layer.msg('已复制响应内容', {icon:1, time:1500});
            });
        }
    }

    function onCaseDataInput() {
        var el = document.getElementById('f_tc_data');
        var hint = document.getElementById('f_tc_data_hint');
        if (!el || !hint) return;
        var val = el.value;
        if (!val.trim()) { hint.className = 'field-hint'; hint.innerHTML = 'JSON 格式，如 <code>{"username":"admin"}</code>；GET 请求作为查询参数，POST 作为请求体。支持 <code>#now#</code> <code>#faker_name#</code> 等占位符'; return; }
        var result = validateCaseData(val, '');
        if (result.ok) { hint.className = 'field-ok'; hint.innerHTML = '<i class="fas fa-check"></i> 格式正确'; }
        else { hint.className = 'field-error'; hint.innerHTML = '<i class="fas fa-times"></i> ' + result.msg; }
    }

    function onCheckRulesInput() {
        var el = document.getElementById('f_tc_rules');
        var hint = document.getElementById('f_tc_rules_hint');
        if (!el || !hint) return;
        var val = el.value;
        if (!val.trim()) { hint.className = 'field-hint'; hint.innerHTML = 'JSON 数组格式，如 <code>[{"json":"$.status"}]</code>。支持5种断言：<code>json</code> <code>exist</code> <code>not_exist</code> <code>sql</code> <code>status_code</code>'; return; }
        var result = validateCheckRules(val);
        if (result.ok) { hint.className = 'field-ok'; hint.innerHTML = '<i class="fas fa-check"></i> 格式正确'; }
        else { hint.className = 'field-error'; hint.innerHTML = '<i class="fas fa-times"></i> ' + result.msg; }
        onExpectedInput();
    }

    function onExpectedInput() {
        var rulesEl = document.getElementById('f_tc_rules');
        var expectedEl = document.getElementById('f_tc_expected');
        var hint = document.getElementById('f_tc_expected_hint');
        if (!rulesEl || !expectedEl || !hint) return;
        var rulesVal = rulesEl.value;
        var expectedVal = expectedEl.value;
        if (!rulesVal.trim() && !expectedVal.trim()) { hint.className = 'field-hint'; hint.innerHTML = 'JSON 数组，与断言规则<strong>一一对应</strong>（数量相同、位置对齐），如 <code>["1"]</code>'; return; }
        var result = validateExpectedResults(rulesVal, expectedVal);
        if (result.ok) { hint.className = 'field-ok'; hint.innerHTML = '<i class="fas fa-check"></i> 格式正确'; }
        else { hint.className = 'field-error'; hint.innerHTML = '<i class="fas fa-times"></i> ' + result.msg; }
    }
</script>
</div>
