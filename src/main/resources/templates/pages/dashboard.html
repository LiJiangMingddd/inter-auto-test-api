<!DOCTYPE html>
<!-- ============================================================
     数据统计页面碎片（炫酷版）
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="dashboard-page">

<style>
/* ---- 统计卡片炫酷风格 ---- */
.dash-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:24px; }
.dash-card {
    position:relative; border-radius:16px; padding:26px 20px 22px;
    text-align:center; overflow:hidden; isolation:isolate;
    transition:transform .4s cubic-bezier(.4,0,.2,1), box-shadow .4s ease;
    cursor:default;
}
.dash-card::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.25) 0%, rgba(255,255,255,.05) 100%);
    z-index:1; pointer-events:none;
}
.dash-card::after {
    content:''; position:absolute; top:-50%; left:-50%;
    width:200%; height:200%;
    background:radial-gradient(circle at 30% 40%, rgba(255,255,255,.15) 0%, transparent 60%);
    z-index:0; pointer-events:none;
    transition:opacity .6s;
}
.dash-card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 16px 48px rgba(0,0,0,.18) !important; }
.dash-card:hover::after { opacity:.6; }

.dash-card .card-bg-icon {
    position:absolute; right:-10px; bottom:-10px; font-size:80px;
    opacity:.08; z-index:0; transition:all .5s;
}
.dash-card:hover .card-bg-icon { transform:rotate(-8deg) scale(1.1); opacity:.14; }

.dash-card .card-icon {
    position:relative; z-index:2; display:inline-flex; align-items:center; justify-content:center;
    width:52px; height:52px; border-radius:14px; font-size:24px; color:#fff;
    margin-bottom:12px; box-shadow:0 6px 20px rgba(0,0,0,.12);
    transition:transform .5s cubic-bezier(.34,1.56,.64,1);
}
.dash-card:hover .card-icon { transform:scale(1.12) rotate(-2deg); }

.dash-card .card-number {
    position:relative; z-index:2; font-size:32px; font-weight:800;
    letter-spacing:-0.5px; line-height:1.2; margin-bottom:4px;
    transition:color .3s;
}
.dash-card .card-label {
    position:relative; z-index:2; font-size:13px; font-weight:500; opacity:.8;
    letter-spacing:.5px;
}

/* 各卡片配色 */
.card-purple { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:#fff; box-shadow:0 8px 28px rgba(102,126,234,.3); }
.card-green  { background:linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color:#fff; box-shadow:0 8px 28px rgba(17,153,142,.3); }
.card-orange { background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color:#fff; box-shadow:0 8px 28px rgba(245,87,108,.3); }
.card-blue   { background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color:#fff; box-shadow:0 8px 28px rgba(79,172,254,.3); }

.card-purple .card-icon { background:rgba(255,255,255,.2); }
.card-green  .card-icon { background:rgba(255,255,255,.2); }
.card-orange .card-icon { background:rgba(255,255,255,.2); }
.card-blue   .card-icon { background:rgba(255,255,255,.2); }

/* ---- 图表容器风格 ---- */
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.chart-box {
    background: var(--bg-card); backdrop-filter:blur(12px);
    border-radius:16px; padding:20px 22px;
    border:1px solid var(--border-color);
    transition:all .4s;
}
.chart-box:hover { background: var(--bg-card-hover); transform:translateY(-2px); }
.chart-box .chart-title {
    font-size:15px; font-weight:600; color:var(--text-primary); margin-bottom:14px; padding-bottom:12px;
    border-bottom:1px solid var(--border-color); display:flex; align-items:center; gap:8px;
}
.chart-box .chart-title i { color:#667eea; }

/* ---- 数字跳动动画 ---- */
@keyframes countPop {
    0% { transform:scale(.6); opacity:0; }
    60% { transform:scale(1.12); }
    100% { transform:scale(1); opacity:1; }
}
.count-anim { animation:countPop .5s cubic-bezier(.34,1.56,.64,1) both; }

/* ---- 图表入场 ---- */
@keyframes chartFadeUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
}
.chart-anim { animation:chartFadeUp .6s ease both; }
.chart-anim:nth-child(2) { animation-delay:.15s; }
.chart-anim:nth-child(3) { animation-delay:.3s; }
.chart-anim:nth-child(4) { animation-delay:.45s; }

/* ---- 时间线 ---- */
.timeline-list { list-style:none; padding:0; margin:0; }
.timeline-item {
    display:flex; align-items:flex-start; gap:12px;
    padding:10px 0; border-bottom:1px solid var(--border-light);
    font-size:13px; transition:background .2s;
}
.timeline-item:last-child { border-bottom:none; }
.timeline-item:hover { background:rgba(102,126,234,.04); }
.timeline-dot {
    width:10px; height:10px; border-radius:50%; margin-top:5px; flex-shrink:0;
}
.timeline-dot.pass { background:#38ef7d; box-shadow:0 0 8px rgba(56,239,125,.3); }
.timeline-dot.fail { background:#f5576c; box-shadow:0 0 8px rgba(245,87,108,.3); }
.timeline-dot.pending { background:#ffa726; box-shadow:0 0 8px rgba(255,167,38,.3); }
.timeline-info { flex:1; min-width:0; }
.timeline-title { color:var(--text-primary); font-weight:500; }
.timeline-meta { color:var(--text-muted); font-size:11px; margin-top:2px; }

/* ---- 热力图 ---- */
.heatmap-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(80px,1fr)); gap:8px; }
.heatmap-cell {
    border-radius:8px; padding:10px 8px; text-align:center;
    font-size:11px; transition:all .3s; cursor:pointer;
    border:1px solid transparent;
}
.heatmap-cell:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.15); }
.heatmap-cell .hm-name { font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.heatmap-cell .hm-count { font-size:10px; opacity:.7; }
.heatmap-cell.hm-good { background:rgba(56,239,125,.12); color:#38ef7d; border-color:rgba(56,239,125,.2); }
.heatmap-cell.hm-warn { background:rgba(255,167,38,.12); color:#ffa726; border-color:rgba(255,167,38,.2); }
.heatmap-cell.hm-bad { background:rgba(245,87,108,.12); color:#f5576c; border-color:rgba(245,87,108,.2); }
.heatmap-cell.hm-empty { background:var(--bg-card); color:var(--text-muted); border-color:var(--border-color); }
</style>

<!-- 统计卡片（炫酷渐变） -->
<div class="dash-grid">
    <div class="dash-card card-purple card-stagger">
        <div class="card-bg-icon"><i class="fas fa-plug"></i></div>
        <div class="card-icon"><i class="fas fa-plug"></i></div>
        <div class="card-number" id="statInterfaces">0</div>
        <div class="card-label">接 口 总 数</div>
    </div>
    <div class="dash-card card-green card-stagger">
        <div class="card-bg-icon"><i class="fas fa-vial"></i></div>
        <div class="card-icon"><i class="fas fa-flask"></i></div>
        <div class="card-number" id="statTestcases">0</div>
        <div class="card-label">用 例 总 数</div>
    </div>
    <div class="dash-card card-orange card-stagger">
        <div class="card-bg-icon"><i class="fas fa-users"></i></div>
        <div class="card-icon"><i class="fas fa-users"></i></div>
        <div class="card-number" id="statUsers">0</div>
        <div class="card-label">用 户 总 数</div>
    </div>
    <div class="dash-card card-blue card-stagger">
        <div class="card-bg-icon"><i class="fas fa-check-circle"></i></div>
        <div class="card-icon"><i class="fas fa-check-circle"></i></div>
        <div class="card-number" id="statEnabled">0</div>
        <div class="card-label">启 用 接 口</div>
    </div>
</div>

<!-- ECharts 图表 -->
<div class="chart-grid">
    <div class="chart-box chart-anim card-glow">
        <div class="glow-spot"></div>
        <div class="chart-title"><i class="fas fa-chart-bar"></i> 各接口用例数量</div>
        <div id="chartInterface" style="height:300px;"></div>
    </div>
    <div class="chart-box chart-anim card-glow">
        <div class="glow-spot"></div>
        <div class="chart-title"><i class="fas fa-chart-pie"></i> 用例环境分布</div>
        <div id="chartEnv" style="height:300px;"></div>
    </div>
    <div class="chart-box chart-anim card-glow">
        <div class="glow-spot"></div>
        <div class="chart-title"><i class="fas fa-gauge-high"></i> 通过率仪表盘</div>
        <div id="chartGauge" style="height:300px;"></div>
    </div>
    <div class="chart-box chart-anim card-glow">
        <div class="glow-spot"></div>
        <div class="chart-title"><i class="fas fa-clock-rotate-left"></i> 最近执行时间线</div>
        <div id="timelineContainer" style="height:300px;overflow-y:auto;"></div>
    </div>
</div>

<!-- 接口健康度热力图 -->
<div class="chart-box chart-anim card-glow" style="margin-top:18px;">
    <div class="glow-spot"></div>
    <div class="chart-title"><i class="fas fa-heart-pulse"></i> 接口健康度热力图</div>
    <div id="heatmapContainer" class="heatmap-grid"></div>
</div>

<script>
function loadDashboard() {
    ajax({
        url: '/api/dashboard/stats',
        success: function(res) {
            if (res.code !== 200) return;
            var d = res.data;

            animateNumber('statInterfaces', d.totalInterfaces || 0);
            animateNumber('statTestcases', d.totalTestcases || 0);
            animateNumber('statUsers', d.totalUsers || 0);
            animateNumber('statEnabled', d.enabledInterfaces || 0);

            if (typeof echarts !== 'undefined') {
                // ====== 柱状图：各接口用例数 ======
                var chart1 = echarts.init(document.getElementById('chartInterface'));
                chart1.setOption({
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' },
                        backgroundColor: 'rgba(255,255,255,.92)',
                        borderColor: '#667eea',
                        borderWidth: 1,
                        textStyle: { color: '#333', fontSize: 12 }
                    },
                    grid: { left: 45, right: 20, top: 25, bottom: 50 },
                    xAxis: {
                        type: 'category',
                        data: d.chartNames || [],
                        axisLabel: { rotate: 22, fontSize: 11, interval: 0, color: '#999' },
                        axisLine: { lineStyle: { color: '#eee' } },
                        axisTick: { show: false }
                    },
                    yAxis: {
                        type: 'value',
                        minInterval: 1,
                        splitLine: { lineStyle: { color: '#f5f5f5', type: 'dashed' } },
                        axisLabel: { color: '#999' }
                    },
                    series: [{
                        type: 'bar',
                        data: d.chartCounts || [],
                        barMaxWidth: 38,
                        itemStyle: {
                            borderRadius: [6,6,0,0],
                            color: {
                                type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: '#667eea' },
                                    { offset: 1, color: '#764ba2' }
                                ]
                            }
                        },
                        emphasis: {
                            itemStyle: {
                                color: {
                                    type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: '#7b93f5' },
                                        { offset: 1, color: '#8b5cf6' }
                                    ]
                                }
                            }
                        },
                        animationDuration: 800,
                        animationEasing: 'cubicOut'
                    }]
                });
                chart1.on('click', function(params) {
                    if (params.dataIndex !== undefined && d.chartIds && d.chartIds[params.dataIndex]) {
                        if (typeof switchTab === 'function') switchTab('interface');
                    }
                });

                // ====== 饼图：环境分布 ======
                var chart2 = echarts.init(document.getElementById('chartEnv'));
                chart2.setOption({
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}: {c} ({d}%)',
                        backgroundColor: 'rgba(255,255,255,.92)',
                        borderColor: '#667eea',
                        borderWidth: 1,
                        textStyle: { color: '#333' }
                    },
                    legend: {
                        bottom: 8,
                        textStyle: { color: '#999', fontSize: 12 },
                        itemWidth: 12,
                        itemHeight: 12
                    },
                    series: [{
                        type: 'pie',
                        radius: ['38%', '62%'],
                        center: ['50%', '44%'],
                        label: {
                            show: true,
                            formatter: '{b}\n{d}%',
                            fontSize: 12,
                            color: '#666'
                        },
                        labelLine: { length: 12, length2: 14, smooth: true },
                        emphasis: {
                            label: { fontSize: 14, fontWeight: 'bold' },
                            itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,.15)' }
                        },
                        data: [
                            { value: d.envDev || 0, name: 'DEV',
                              itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#4facfe'},{offset:1,color:'#00f2fe'}]) } },
                            { value: d.envUat || 0, name: 'UAT',
                              itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f093fb'},{offset:1,color:'#f5576c'}]) } },
                            { value: d.envPro || 0, name: 'PRO',
                              itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#11998e'},{offset:1,color:'#38ef7d'}]) } }
                        ],
                        animationDuration: 800,
                        animationEasing: 'cubicOut'
                    }]
                });

                // ====== 仪表盘：通过率 ======
                var chart3 = echarts.init(document.getElementById('chartGauge'));
                var enabledRate = d.totalInterfaces > 0 ? Math.round((d.enabledInterfaces / d.totalInterfaces) * 100) : 0;
                chart3.setOption({
                    series: [{
                        type: 'gauge',
                        startAngle: 220,
                        endAngle: -40,
                        min: 0,
                        max: 100,
                        splitNumber: 10,
                        radius: '85%',
                        center: ['50%', '55%'],
                        axisLine: {
                            lineStyle: {
                                width: 18,
                                color: [
                                    [0.3, '#f5576c'],
                                    [0.7, '#ffa726'],
                                    [1, '#38ef7d']
                                ]
                            }
                        },
                        pointer: {
                            icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z',
                            length: '55%',
                            width: 10,
                            offsetCenter: [0, '-10%'],
                            itemStyle: { color: 'auto' }
                        },
                        axisTick: { length: 6, lineStyle: { color: 'auto', width: 1 } },
                        splitLine: { length: 14, lineStyle: { color: 'auto', width: 2 } },
                        axisLabel: { color: '#999', fontSize: 11, distance: 20 },
                        detail: {
                            valueAnimation: true,
                            formatter: '{value}%',
                            color: 'inherit',
                            fontSize: 28,
                            fontWeight: 'bold',
                            offsetCenter: [0, '40%']
                        },
                        title: {
                            offsetCenter: [0, '60%'],
                            fontSize: 13,
                            color: '#999'
                        },
                        data: [{ value: enabledRate, name: '启用率' }],
                        animationDuration: 1200,
                        animationEasing: 'cubicOut'
                    }]
                });

                // 自适应
                if (!window._dashChartsResized) {
                    window._dashChartsResized = true;
                    var resizeTimer;
                    window.addEventListener('resize', function() {
                        clearTimeout(resizeTimer);
                        resizeTimer = setTimeout(function() {
                            if (chart1) chart1.resize();
                            if (chart2) chart2.resize();
                            if (chart3) chart3.resize();
                        }, 150);
                    });
                }
            }

            // ====== 时间线：模拟最近执行记录 ======
            loadTimeline();

            // ====== 热力图：接口健康度 ======
            loadHeatmap(d);
        }
    });
}

function loadTimeline() {
    var container = document.getElementById('timelineContainer');
    if (!container) return;
    ajax({
        url: '/api/interface/page?pageNum=1&pageSize=10',
        success: function(res) {
            if (res.code !== 200 || !res.data) return;
            var records = res.data.records || [];
            var html = '<ul class="timeline-list">';
            if (records.length === 0) {
                html += '<div style="text-align:center;padding:40px 0;color:var(--text-muted);"><i class="fas fa-clock" style="font-size:24px;display:block;margin-bottom:8px;"></i>暂无执行记录</div>';
            } else {
                records.forEach(function(item, i) {
                    var status = item.enabled === 1 ? 'pass' : 'fail';
                    var statusText = item.enabled === 1 ? '启用' : '禁用';
                    var methodColor = item.method === 'GET' ? '#4facfe' : item.method === 'POST' ? '#38ef7d' : item.method === 'DELETE' ? '#f5576c' : '#ffa726';
                    html += '<li class="timeline-item">' +
                        '<span class="timeline-dot ' + status + '"></span>' +
                        '<div class="timeline-info">' +
                        '<div class="timeline-title">' + escHtml(item.apiName) + '</div>' +
                        '<div class="timeline-meta">' +
                        '<span style="color:' + methodColor + ';font-weight:600;">' + escHtml(item.method) + '</span>' +
                        ' · <span class="tag ' + (item.enabled === 1 ? 'tag-success' : 'tag-danger') + '" style="font-size:10px;padding:1px 6px;">' + statusText + '</span>' +
                        ' · ' + (item.testcaseCount || 0) + ' 条用例' +
                        '</div></div></li>';
                });
            }
            html += '</ul>';
            container.innerHTML = html;
        }
    });
}

function loadHeatmap(d) {
    var container = document.getElementById('heatmapContainer');
    if (!container) return;
    ajax({
        url: '/api/interface/page?pageNum=1&pageSize=50',
        success: function(res) {
            if (res.code !== 200 || !res.data) return;
            var records = res.data.records || [];
            var html = '';
            if (records.length === 0) {
                html = '<div style="text-align:center;padding:30px 0;color:var(--text-muted);grid-column:1/-1;"><i class="fas fa-heart-pulse" style="font-size:24px;display:block;margin-bottom:8px;"></i>暂无接口数据</div>';
            } else {
                records.forEach(function(item) {
                    var tc = item.testcaseCount || 0;
                    var cls = tc === 0 ? 'hm-empty' : tc <= 2 ? 'hm-bad' : tc <= 5 ? 'hm-warn' : 'hm-good';
                    html += '<div class="heatmap-cell ' + cls + '" onclick="switchTab(\'interface\')" title="' + escHtml(item.apiName) + ' - ' + tc + ' 条用例">' +
                        '<div class="hm-name">' + escHtml(item.apiName) + '</div>' +
                        '<div class="hm-count">' + tc + ' 用例</div></div>';
                });
            }
            container.innerHTML = html;
        }
    });
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function animateNumber(elemId, target) {
    var el = document.getElementById(elemId);
    if (!el) return;
    var start = 0, duration = 900, startTime = null;
    el.classList.remove('count-anim');

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        var eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        var current = Math.round(start + (target - start) * eased);
        el.textContent = current;
        if (progress < 1) requestAnimationFrame(step);
        else { el.textContent = target; el.classList.add('count-anim'); }
    }
    requestAnimationFrame(step);
}
</script>
</div>
</body>
</html>
