<!DOCTYPE html>
<!-- ============================================================
     主布局页面
     使用 Thymeleaf 加载侧边栏 + 各页面碎片
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口自动化中台</title>
    <!-- 样式库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css" rel="stylesheet">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <style>
        /* ================================================================
           主题变量：暗夜紫（默认） & 白天模式
           ================================================================ */
        :root, [data-theme="dark"] {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --bg-glass: rgba(255,255,255,0.03);
            --text-primary: #e0e0f0;
            --text-secondary: #8899b0;
            --text-muted: #5a6a80;
            --border-color: rgba(255,255,255,0.07);
            --border-light: rgba(255,255,255,0.04);
            --accent-purple: #667eea;
            --accent-pink: #764ba2;
            --accent-green: #38ef7d;
            --accent-orange: #f5576c;
            --shadow-color: rgba(0,0,0,0.3);
            --table-hover: rgba(102,126,234,0.05);
            --input-bg: rgba(255,255,255,0.06);
            --scrollbar-thumb: rgba(255,255,255,0.12);
            --scrollbar-track: transparent;
            --sidebar-bg: linear-gradient(180deg, #0d0d24 0%, #111133 100%);
            --sidebar-logo: #e0e0f0;
            --sidebar-border: rgba(255,255,255,0.04);
            --sidebar-text: rgba(255,255,255,0.45);
            --sidebar-text-hover: rgba(255,255,255,0.75);
            --topbar-bg: rgba(17,17,40,0.85);
            --topbar-border: rgba(255,255,255,0.05);
            --content-bg: radial-gradient(ellipse at 30% 20%, rgba(102,126,234,0.06) 0%, transparent 50%),
                          radial-gradient(ellipse at 70% 80%, rgba(118,75,162,0.04) 0%, transparent 50%),
                          var(--bg-primary);
            --table-header-bg: rgba(255,255,255,0.04);
            --tag-success-bg: rgba(46,125,50,0.2);
            --tag-success-text: #66bb6a;
            --tag-danger-bg: rgba(198,40,40,0.2);
            --tag-danger-text: #ef5350;
            --tag-primary-bg: rgba(21,101,192,0.2);
            --tag-primary-text: #64b5f6;
            --env-dev-bg: rgba(21,101,192,0.2);
            --env-dev-text: #64b5f6;
            --env-uat-bg: rgba(230,81,0,0.2);
            --env-uat-text: #ffa726;
            --env-pro-bg: rgba(198,40,40,0.2);
            --env-pro-text: #ef5350;
            --layer-bg: #1a1a35;
            --code-bg: rgba(255,255,255,0.06);
            --code-text: #82aaff;
            --empty-color: var(--text-muted);
            --btn-default-bg: rgba(255,255,255,0.04);
            --btn-default-text: #8899b0;
            --btn-default-border: rgba(255,255,255,0.1);
        }

        /* ===== 白天模式 ===== */
        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8f9ff;
            --bg-glass: rgba(255,255,255,0.8);
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --text-muted: #999;
            --border-color: #e8e8e8;
            --border-light: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.06);
            --table-hover: rgba(102,126,234,0.06);
            --input-bg: #ffffff;
            --scrollbar-thumb: #d0d0d0;
            --scrollbar-track: #f5f5f5;
            --sidebar-bg: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            --sidebar-logo: #ffffff;
            --sidebar-border: rgba(255,255,255,0.06);
            --sidebar-text: rgba(255,255,255,0.55);
            --sidebar-text-hover: rgba(255,255,255,0.85);
            --topbar-bg: #ffffff;
            --topbar-border: #e8e8e8;
            --content-bg: #f0f2f5;
            --table-header-bg: #fafafa;
            --tag-success-bg: #e8f5e9;
            --tag-success-text: #2e7d32;
            --tag-danger-bg: #fbe9e7;
            --tag-danger-text: #c62828;
            --tag-primary-bg: #e3f2fd;
            --tag-primary-text: #1565c0;
            --env-dev-bg: #e3f2fd;
            --env-dev-text: #1565c0;
            --env-uat-bg: #fff3e0;
            --env-uat-text: #e65100;
            --env-pro-bg: #fbe9e7;
            --env-pro-text: #c62828;
            --layer-bg: #ffffff;
            --code-bg: #f5f5f5;
            --code-text: #667eea;
            --empty-color: #bbb;
            --btn-default-bg: #ffffff;
            --btn-default-text: #999;
            --btn-default-border: #e8e8e8;
        }

        /* ===== 主题切换过渡动画 ===== */
        body, .sidebar, .topbar, .content-area, .card, .layui-table,
        .layui-layer, .layui-input, .layui-btn, .logout-btn,
        .dash-card, .chart-box, .api-section, .code-block,
        .markdown-body, .layui-form-select dl,
        .layui-table-page, .layui-table-box, ::-webkit-scrollbar-thumb {
            transition: background-color 0.4s ease,
                        color 0.4s ease,
                        border-color 0.4s ease,
                        box-shadow 0.4s ease !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary); color: var(--text-primary); overflow: hidden;
        }

        /* ===== 主布局容器 ===== */
        .app-container { display: flex; height: 100vh; }

        /* ================================================================
           侧边栏
           ================================================================ */
        .sidebar {
            width: 250px; background: var(--sidebar-bg);
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: width 0.3s ease; z-index: 100;
            box-shadow: 2px 0 30px var(--shadow-color);
            border-right: 1px solid var(--sidebar-border);
        }
        .sidebar-logo {
            padding: 22px 20px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-logo .logo-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-size: 20px; margin-bottom: 8px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.25);
        }
        .sidebar-logo h2 { color: var(--sidebar-logo); font-size: 16px; font-weight: 600; letter-spacing: 1px; }
        .sidebar-logo p { color: rgba(255,255,255,0.2); font-size: 11px; margin-top: 2px; }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

        .nav-section { margin-bottom: 6px; }
        .nav-section-title {
            padding: 8px 22px 4px; font-size: 11px; color: rgba(255,255,255,0.2);
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .nav-item {
            display: flex; align-items: center; padding: 12px 22px;
            color: var(--sidebar-text); cursor: pointer;
            transition: all 0.25s ease; font-size: 14px;
            border-left: 3px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--sidebar-text-hover); }
        .nav-item.active {
            background: rgba(102,126,234,0.12); color: #667eea;
            border-left-color: #667eea;
        }
        .nav-item i { width: 22px; font-size: 16px; margin-right: 10px; text-align: center; }

        /* ================================================================
           右侧主区域
           ================================================================ */
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ===== 顶部栏 ===== */
        .topbar {
            height: 56px; background: var(--topbar-bg); backdrop-filter: blur(16px);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--topbar-border);
            z-index: 10;
        }
        .topbar-left .page-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
        .topbar-left .page-title i { margin-right: 8px; color: var(--accent-purple); }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-right .user-info { display: flex; align-items: center; gap: 8px; color: #8899b0; font-size: 14px; }
        .topbar-right .user-info .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 600;
        }
        .logout-btn {
            padding: 6px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            background: rgba(255,255,255,0.04); color: #8899b0; cursor: pointer; font-size: 13px;
            transition: all 0.25s;
        }
        .logout-btn:hover { border-color: rgba(255,255,255,0.2); color: #e0e0f0; background: rgba(255,255,255,0.08); }

        /* ===== 内容区 ===== */
        .content-area {
            flex: 1; padding: 22px; overflow-y: auto;
            background: var(--content-bg);
        }
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

        /* ===== 页面面板 ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 卡片 ===== */
        .card {
            background: var(--bg-card); border-radius: 14px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            padding: 22px 24px; margin-bottom: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.1);
            background: var(--bg-card-hover);
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .card-header h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .card-header h3 i { color: #667eea; margin-right: 8px; }

        /* ===== 工具栏 ===== */
        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar .layui-btn { border-radius: 8px; }
        .search-bar { display: flex; align-items: center; gap: 10px; }
        .search-bar .layui-input {
            border-radius: 8px; height: 36px;
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            transition: border-color 0.3s;
        }
        .search-bar .layui-input:focus { border-color: #667eea !important; }
        .search-bar .layui-input::placeholder { color: var(--text-muted); }

        /* ===== 表格 ===== */
        .layui-table {
            border-radius: 10px; overflow: hidden;
            background: transparent !important;
            color: var(--text-primary) !important;
        }
        .layui-table th {
            background: rgba(255,255,255,0.04) !important;
            color: var(--text-secondary) !important;
            font-weight: 600;
            border-color: var(--border-color) !important;
        }
        .layui-table td {
            border-color: var(--border-light) !important;
            color: var(--text-primary) !important;
        }
        .layui-table tr:hover td {
            background: var(--table-hover) !important;
        }
        .layui-table tr {
            transition: background 0.2s;
        }

        /* ===== 状态标签 ===== */
        .tag { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .tag-success { background: var(--tag-success-bg); color: var(--tag-success-text); }
        .tag-danger { background: var(--tag-danger-bg); color: var(--tag-danger-text); }
        .tag-primary { background: var(--tag-primary-bg); color: var(--tag-primary-text); }
        .tag-warning { background: var(--env-uat-bg); color: var(--env-uat-text); }

        /* ===== URL 单元格截断 ===== */
        .url-cell {
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-size: 12px; color: var(--text-secondary); cursor: default;
            position: relative;
        }
        .url-cell .url-text {
            display: inline-block; max-width: 160px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            vertical-align: middle;
        }
        .url-cell .url-copy-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border: none; border-radius: 4px;
            background: transparent; color: rgba(255,255,255,0.2); cursor: pointer;
            font-size: 11px; transition: all 0.2s; vertical-align: middle; margin-left: 4px;
            opacity: 0;
        }
        .url-cell:hover .url-copy-btn { opacity: 1; }
        .url-cell .url-copy-btn:hover { background: rgba(46,125,50,0.2); color: #66bb6a; }
        .url-cell .url-copy-btn.copied { background: rgba(46,125,50,0.2); color: #66bb6a; }

        /* ===== 表格行进入动画 ===== */
        .table-row-enter { animation: rowSlideIn 0.35s ease both; }
        @keyframes rowSlideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== 环境标签优化 ===== */
        .env-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px;
        }
        .env-badge.dev { background: var(--env-dev-bg); color: var(--env-dev-text); }
        .env-badge.uat { background: var(--env-uat-bg); color: var(--env-uat-text); }
        .env-badge.pro { background: var(--env-pro-bg); color: var(--env-pro-text); }

        /* ===== 卡片/按钮动画增强 ===== */
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .layui-btn {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            position: relative; overflow: hidden;
        }
        .layui-btn:active { transform: scale(0.95); }

        /* 按钮涟漪效果 */
        .layui-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transition: width 0.4s, height 0.4s, opacity 0.4s;
            transform: translate(-50%, -50%); opacity: 0;
        }
        .layui-btn:active::after {
            width: 200px; height: 200px; opacity: 1;
        }

        /* 空状态动画 */
        .empty-state i { animation: floatIcon 2s ease-in-out infinite; }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .empty-state { text-align: center; padding: 50px 0; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }

        /* ===== 分页美化 ===== */
        .page-panel .layui-laypage { margin: 18px 0 0 !important; }
        .page-panel .layui-laypage a, .page-panel .layui-laypage span {
            border-radius: 6px !important; margin: 0 2px !important;
            transition: all 0.2s;
            background: var(--input-bg) !important;
            border-color: var(--border-color) !important;
            color: var(--text-secondary) !important;
        }
        .page-panel .layui-laypage a:hover {
            background: rgba(102,126,234,0.15) !important;
            color: #667eea !important;
        }
        .page-panel .layui-laypage .layui-laypage-curr .layui-laypage-em {
            border-radius: 6px !important;
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
        }
        .page-panel .layui-laypage .layui-laypage-curr span {
            color: #fff !important;
            background: transparent !important;
            border-color: transparent !important;
        }

        /* ===== 弹窗美化 ===== */
        .layui-layer-title {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            color: #fff !important; border-radius: 12px 12px 0 0 !important;
        }
        .layui-layer {
            border-radius: 12px !important; overflow: hidden;
            background: var(--layer-bg) !important;
            box-shadow: 0 16px 60px rgba(0,0,0,0.5) !important;
        }
        .layui-layer-content {
            color: var(--text-primary) !important;
        }
        .layui-layer-btn {
            background: rgba(255,255,255,0.02) !important;
            border-top: 1px solid var(--border-color) !important;
        }
        .layui-layer-btn a {
            border-color: var(--border-color) !important;
            background: var(--input-bg) !important;
            color: var(--text-primary) !important;
        }
        .layui-layer-btn .layui-layer-btn0 {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            border-color: transparent !important;
            color: #fff !important;
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

        /* ===== 操作按钮 ===== */
        .action-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border: none; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .action-btn.edit { background: rgba(25,118,210,0.15); color: #64b5f6; }
        .action-btn.edit:hover { background: #1976d2; color: #fff; }
        .action-btn.role { background: rgba(230,81,0,0.15); color: #ffa726; }
        .action-btn.role:hover { background: #e65100; color: #fff; }
        .action-btn.danger { background: rgba(198,40,40,0.15); color: #ef5350; }
        .action-btn.danger:hover { background: #c62828; color: #fff; }
        .action-btn.perm { background: rgba(46,125,50,0.15); color: #66bb6a; }
        .action-btn.perm:hover { background: #2e7d32; color: #fff; }

        /* ===== Layui 输入框暗色适配 ===== */
        .layui-input, .layui-textarea, .layui-select {
            background: var(--input-bg) !important;
            border-color: var(--border-color) !important;
            color: var(--text-primary) !important;
        }
        .layui-input:focus, .layui-textarea:focus {
            border-color: #667eea !important;
        }
        .layui-input::placeholder {
            color: var(--text-muted) !important;
        }
        .layui-form-label {
            color: var(--text-secondary) !important;
        }

        /* ===== Layui checkbox 暗色适配 ===== */
        .layui-form-checkbox {
            background: var(--input-bg) !important;
            border-color: var(--border-color) !important;
        }
        .layui-form-checkbox span {
            color: var(--text-primary) !important;
        }
        .layui-form-checkbox[lay-skin=primary] {
            border-color: var(--border-color) !important;
            background: transparent !important;
        }
        .layui-form-checkbox[lay-skin=primary] i {
            border-color: var(--border-color) !important;
            background: var(--input-bg) !important;
        }
        .layui-form-checkbox[lay-skin=primary]:hover i {
            border-color: #667eea !important;
        }

        /* ===== 弹窗内原生 select 修复（layui-form 会隐藏原生 select） ===== */
        .layui-layer-content .layui-form select {
            display: block !important;
            -webkit-appearance: menulist !important;
            -moz-appearance: menulist !important;
            appearance: menulist !important;
            width: 100% !important;
            height: 38px !important;
            padding: 0 12px !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 6px !important;
            font-size: 13px !important;
            background: var(--input-bg) !important;
            color: var(--text-primary) !important;
            outline: none !important;
            cursor: pointer !important;
        }
        .layui-layer-content .layui-form select option {
            background: var(--layer-bg);
            color: var(--text-primary);
        }

        /* ===== Layui 下拉选择框暗色适配 ===== */
        .layui-form-select .layui-input {
            background: var(--input-bg) !important;
        }
        .layui-form-select dl {
            background: var(--layer-bg) !important;
            border-color: var(--border-color) !important;
        }
        .layui-form-select dl dd {
            color: var(--text-primary) !important;
        }
        .layui-form-select dl dd:hover {
            background: rgba(102,126,234,0.12) !important;
        }
        .layui-form-select dl dd.layui-this {
            background: rgba(102,126,234,0.2) !important;
            color: #667eea !important;
        }

        /* ===== 确认弹窗 ===== */
        .layui-layer-dialog .layui-layer-content {
            color: var(--text-primary) !important;
        }
        .layui-layer-dialog .layui-layer-setwin .layui-layer-close1 {
            background: rgba(255,255,255,0.1) !important;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-logo h2, .sidebar-logo p, .nav-item span, .nav-section-title { display: none; }
            .nav-item { justify-content: center; padding: 14px; }
            .nav-item i { margin: 0; }
            .topbar { padding: 0 16px; }
            .content-area { padding: 14px; }
        }

        /* ================================================================
           Layui 表格暗色补丁
           ================================================================ */
        .layui-table-box, .layui-table-body, .layui-table-header {
            background: transparent !important;
        }
        .layui-table-page {
            background: transparent !important;
            border-color: var(--border-color) !important;
        }
        .layui-table-page .layui-laypage a, .layui-table-page .layui-laypage span {
            background: var(--input-bg) !important;
            border-color: var(--border-color) !important;
            color: var(--text-secondary) !important;
        }
        .layui-table-page .layui-laypage .layui-laypage-curr span {
            color: #fff !important;
            background: transparent !important;
        }
        .layui-table-page .layui-laypage a:hover {
            color: #667eea !important;
        }

        /* ===== 暗色模式下的表格列头 ===== */
        .layui-table-init {
            background: rgba(10,10,26,0.8) !important;
        }
        .layui-table-init .layui-icon {
            color: #667eea !important;
        }

        /* ===== code 标签暗色适配 ===== */
        code {
            background: var(--code-bg) !important;
            color: var(--code-text) !important;
            padding: 2px 8px !important;
            border-radius: 4px !important;
        }

        /* ================================================================
           表格自适应样式
           ================================================================ */
        .layui-table[lay-size="lg"] {
            table-layout: auto;
        }
        .layui-table td, .layui-table th {
            white-space: nowrap;
            padding: 8px 10px !important;
        }

        /* ===== 单元格文本截断 ===== */
        .cell-ellipsis {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: default;
        }
        .cell-ellipsis:hover {
            overflow: visible;
            white-space: normal;
        }

        /* ===== 轻量 Tooltip ===== */
        .cell-tip {
            position: relative;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
            cursor: default;
        }
        .cell-tip .tip-content {
            display: none;
            position: absolute;
            left: 50%;
            bottom: calc(100% + 6px);
            transform: translateX(-50%);
            background: rgba(30,30,60,0.95);
            color: #e0e0f0;
            font-size: 12px;
            line-height: 1.5;
            padding: 6px 12px;
            border-radius: 6px;
            white-space: normal;
            word-break: break-all;
            max-width: 360px;
            min-width: 80px;
            z-index: 99999;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        [data-theme="light"] .cell-tip .tip-content {
            background: rgba(50,50,50,0.95);
            color: #f0f0f0;
        }
        .cell-tip .tip-content::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 100%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(30,30,60,0.95);
        }
        [data-theme="light"] .cell-tip .tip-content::after {
            border-top-color: rgba(50,50,50,0.95);
        }
        .cell-tip:hover .tip-content {
            display: block;
        }

        .layui-table td:last-child, .layui-table th:last-child {
            position: sticky; right: 0;
            background: var(--bg-primary);
            z-index: 2;
        }
        .layui-table td.ops-cell, .layui-table th.ops-cell {
            position: sticky; right: 0;
            background: var(--bg-primary);
            z-index: 2;
            min-width: 180px;
        }
        .layui-table td.ops-cell {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            gap: 4px;
        }
        [data-theme="light"] .layui-table td.ops-cell,
        [data-theme="light"] .layui-table th.ops-cell {
            background: #ffffff;
        }
        .layui-table tr:hover td.ops-cell,
        .layui-table tr:hover th.ops-cell {
            background: var(--bg-primary) !important;
        }
        [data-theme="light"] .layui-table tr:hover td.ops-cell,
        [data-theme="light"] .layui-table tr:hover th.ops-cell {
            background: #ffffff !important;
        }
        /* 列最大宽度限制，防止过宽 */
        .layui-table td:not(.ops-cell) {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* URL 列智能宽度 */
        .layui-table td .url-cell {
            max-width: 160px;
        }
        .layui-table td .url-cell .url-text {
            max-width: 120px;
        }
        @media (max-width: 1200px) {
            .layui-table td, .layui-table th {
                padding: 6px 8px !important;
            }
            .layui-table td .url-cell {
                max-width: 100px;
            }
            .layui-table td .url-cell .url-text {
                max-width: 75px;
            }
            .layui-table td:not(.ops-cell) {
                max-width: 150px;
            }
            .layui-table td.ops-cell, .layui-table th.ops-cell {
                min-width: 140px;
            }
        }

        /* ===== 主题切换按钮 ===== */
        .theme-toggle-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-secondary);
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }
        .theme-toggle-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(102,126,234,0.1);
            transform: rotate(15deg);
        }
        .theme-toggle-btn .sun-icon { display: none; }
        .theme-toggle-btn .moon-icon { display: inline-block; }
        [data-theme="light"] .theme-toggle-btn .sun-icon { display: inline-block; }
        [data-theme="light"] .theme-toggle-btn .moon-icon { display: none; }

        /* ===== 空状态白天适配 ===== */
        [data-theme="light"] .empty-state { color: #bbb; }

        /* ===== 用户信息白天适配 ===== */
        [data-theme="light"] .topbar-right .user-info { color: #999; }
        [data-theme="light"] .logout-btn {
            background: #ffffff;
            border-color: #e8e8e8;
            color: #999;
        }
        [data-theme="light"] .logout-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: #f8f9ff;
        }

        /* ===== 白天模式 Layui select 下拉修复 ===== */
        [data-theme="light"] .layui-form-select dl {
            background: #ffffff !important;
        }
        [data-theme="light"] .layui-table-init {
            background: rgba(240,242,245,0.9) !important;
        }
        [data-theme="light"] .layui-table tr:hover td {
            background: rgba(102,126,234,0.04) !important;
        }

        /* ===== 白天模式 select option 修复 ===== */
        [data-theme="light"] select option {
            background: #ffffff;
            color: #333;
        }
        [data-theme="light"] .layui-layer-content .layui-form select {
            background: #ffffff !important;
            color: #333 !important;
            border-color: #e8e8e8 !important;
        }
        [data-theme="light"] .layui-layer-content .layui-form select option {
            background: #ffffff;
            color: #333;
        }

        /* ===== 白天模式弹窗按钮修复 ===== */
        [data-theme="light"] .layui-layer-btn a {
            background: #ffffff !important;
            border-color: #e8e8e8 !important;
            color: #333 !important;
        }
        [data-theme="light"] .layui-layer-btn .layui-layer-btn0 {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            border-color: transparent !important;
            color: #fff !important;
        }

        /* ===== 白天模式 checkbox 修复 ===== */
        [data-theme="light"] .layui-form-checkbox {
            background: #ffffff !important;
            border-color: #e8e8e8 !important;
        }
        [data-theme="light"] .layui-form-checkbox span {
            color: #333 !important;
        }
        [data-theme="light"] .layui-form-checkbox[lay-skin=primary] i {
            border-color: #d0d0d0 !important;
            background: #ffffff !important;
        }
        [data-theme="light"] .layui-form-checkbox[lay-skin=primary]:hover i {
            border-color: #667eea !important;
        }

        /* ===== 白天模式表格头修复 ===== */
        [data-theme="light"] .layui-table th {
            background: var(--table-header-bg) !important;
            color: var(--text-secondary) !important;
        }
        [data-theme="light"] .layui-table td {
            color: var(--text-primary) !important;
        }

        /* ===== 白天模式分页修复 ===== */
        [data-theme="light"] .page-panel .layui-laypage a,
        [data-theme="light"] .page-panel .layui-laypage span {
            background: #ffffff !important;
            border-color: #e8e8e8 !important;
            color: #666 !important;
        }

        /* ===== 白天模式操作按钮修复 ===== */
        [data-theme="light"] .action-btn.edit { background: rgba(25,118,210,0.08); color: #1976d2; }
        [data-theme="light"] .action-btn.role { background: rgba(230,81,0,0.08); color: #e65100; }
        [data-theme="light"] .action-btn.danger { background: rgba(198,40,40,0.08); color: #c62828; }
        [data-theme="light"] .action-btn.perm { background: rgba(46,125,50,0.08); color: #2e7d32; }

        /* ===== 格式异常红点提示 ===== */
        .format-warning {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .format-warning .warn-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ef5350;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            cursor: help;
            position: relative;
            flex-shrink: 0;
            animation: warnPulse 2s ease-in-out infinite;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .format-warning .warn-dot:hover {
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(239,83,80,0.5);
            animation: none;
        }
        @keyframes warnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,83,80,0.4); }
            50% { box-shadow: 0 0 0 4px rgba(239,83,80,0); }
        }
        .warn-layer-tip {
            border-left: 3px solid #ef5350 !important;
            border-radius: 8px !important;
            box-shadow: 0 6px 24px rgba(0,0,0,0.35) !important;
            padding: 8px 14px !important;
            word-break: break-all !important;
        }
        [data-theme="light"] .warn-layer-tip {
            background: rgba(50,50,50,0.95) !important;
            color: #f0f0f0 !important;
        }

        /* ===== 表单字段提示 ===== */
        .field-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            line-height: 1.4;
        }
        .field-hint code {
            background: var(--code-bg);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--code-text);
            font-size: 10px;
        }
        .field-error {
            font-size: 11px;
            color: #ef5350;
            margin-top: 3px;
            line-height: 1.4;
        }
        .field-ok {
            font-size: 11px;
            color: #66bb6a;
            margin-top: 3px;
            line-height: 1.4;
        }

        /* ================================================================
           侧边栏折叠
           ================================================================ */
        .sidebar { position: relative; }
        .sidebar-toggle {
            position: absolute; right: -14px; top: 50%;
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; z-index: 101;
            transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        .sidebar-toggle:hover { background: #667eea; color: #fff; border-color: #667eea; }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .sidebar-logo h2,
        .sidebar.collapsed .sidebar-logo p,
        .sidebar.collapsed .nav-item > span:not(.nav-tooltip),
        .sidebar.collapsed .nav-section-title { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 14px; border-left-width: 0; }
        .sidebar.collapsed .nav-item i { margin: 0; font-size: 18px; }
        .sidebar.collapsed .sidebar-logo .logo-icon { margin-bottom: 0; }
        .sidebar.collapsed .sidebar-logo { padding: 18px 10px; }
        .sidebar.collapsed .sidebar-toggle i { transform: rotate(180deg); }
        .nav-item .nav-tooltip {
            display: none; position: absolute; left: 70px; top: 50%;
            transform: translateY(-50%);
            background: var(--layer-bg); color: var(--text-primary);
            padding: 6px 14px; border-radius: 6px; font-size: 13px;
            white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.3);
            border: 1px solid var(--border-color);
            pointer-events: none; opacity: 0;
            transition: opacity .2s;
            z-index: 200;
        }
        .sidebar.collapsed .nav-item .nav-tooltip { display: block; }
        .sidebar.collapsed .nav-item:hover .nav-tooltip { opacity: 1; }

        /* ================================================================
           面包屑导航
           ================================================================ */
        .breadcrumb-bar {
            height: 34px; display: flex; align-items: center;
            padding: 0 28px; background: transparent;
            border-bottom: 1px solid var(--border-light);
            font-size: 12px; color: var(--text-muted);
            flex-shrink: 0;
        }
        .breadcrumb-bar .bc-item { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; transition: color .2s; }
        .breadcrumb-bar .bc-item:hover { color: var(--accent-purple); }
        .breadcrumb-bar .bc-sep { margin: 0 6px; color: var(--text-muted); opacity: .4; }
        .breadcrumb-bar .bc-current { color: var(--accent-purple); font-weight: 500; cursor: default; }
        .breadcrumb-bar .bc-current:hover { color: var(--accent-purple); }

        /* ================================================================
           全局搜索
           ================================================================ */
        .global-search { position: relative; display: flex; align-items: center; }
        .global-search input {
            width: 260px; height: 36px; border-radius: 18px;
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 0 66px 0 36px;
            font-size: 13px; outline: none;
            transition: all 0.35s cubic-bezier(.4,0,.2,1);
        }
        .global-search input::placeholder {
            color: var(--text-muted);
            opacity: .7;
        }
        .global-search input:focus {
            width: 320px; border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,.18);
            transform: translateY(-1px);
        }
        .global-search .gs-icon {
            position: absolute; left: 12px;
            color: var(--text-muted); font-size: 14px;
            pointer-events: none;
            transition: color .3s;
        }
        .global-search:focus-within .gs-icon { color: #667eea; }
        .global-search .gs-shortcut {
            position: absolute; right: 10px;
            background: var(--bg-card-hover); border: 1px solid var(--border-light);
            border-radius: 6px; padding: 2px 7px;
            font-size: 10px; color: var(--text-muted);
            pointer-events: none;
            opacity: .8;
            transition: opacity .3s;
        }
        .global-search input:focus ~ .gs-shortcut { opacity: 0; }
        .search-dropdown {
            position: absolute; top: calc(100% + 8px); left: 0;
            width: 400px; background: var(--layer-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.3);
            max-height: 400px; overflow-y: auto;
            display: none; z-index: 1000;
        }
        .search-dropdown.show { display: block; animation: fadeIn .2s ease; }
        .search-dropdown .sd-header {
            padding: 10px 16px; font-size: 11px; color: var(--text-muted);
            border-bottom: 1px solid var(--border-light);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .search-dropdown .sd-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; cursor: pointer;
            transition: background .2s; border-bottom: 1px solid var(--border-light);
        }
        .search-dropdown .sd-item:last-child { border-bottom: none; }
        .search-dropdown .sd-item:hover { background: rgba(102,126,234,.08); }
        .search-dropdown .sd-item .sd-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .search-dropdown .sd-item .sd-icon.iface { background: rgba(102,126,234,.15); color: #667eea; }
        .search-dropdown .sd-item .sd-icon.tc { background: rgba(17,153,142,.15); color: #38ef7d; }
        .search-dropdown .sd-item .sd-icon.user { background: rgba(245,87,108,.15); color: #f5576c; }
        .search-dropdown .sd-item .sd-text { flex: 1; min-width: 0; }
        .search-dropdown .sd-item .sd-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
        .search-dropdown .sd-item .sd-desc { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-dropdown .sd-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; }

        /* ================================================================
           骨架屏
           ================================================================ */
        .skeleton-overlay {
            position: absolute; inset: 0; z-index: 50;
            background: var(--content-bg); padding: 22px;
            transition: opacity .3s;
        }
        .skeleton-overlay.hidden { opacity: 0; pointer-events: none; }
        .sk-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; margin-bottom: 24px; }
        .sk-stat {
            height: 120px; border-radius: 16px;
            background: linear-gradient(90deg, var(--input-bg) 25%, rgba(255,255,255,.06) 50%, var(--input-bg) 75%);
            background-size: 200% 100%;
            animation: skShimmer 1.5s ease-in-out infinite;
        }
        .sk-card {
            background: var(--bg-card); border-radius: 14px;
            border: 1px solid var(--border-color);
            padding: 22px 24px; margin-bottom: 20px;
        }
        .sk-line {
            height: 14px; border-radius: 7px;
            background: linear-gradient(90deg, var(--input-bg) 25%, rgba(255,255,255,.06) 50%, var(--input-bg) 75%);
            background-size: 200% 100%;
            animation: skShimmer 1.5s ease-in-out infinite;
            margin-bottom: 12px;
        }
        .sk-line:last-child { margin-bottom: 0; }
        .sk-line.w60 { width: 60%; }
        .sk-line.w80 { width: 80%; }
        .sk-line.w40 { width: 40%; }
        .sk-line.h20 { height: 20px; }
        .sk-line.h28 { height: 28px; }
        @keyframes skShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ================================================================
           页面切换动画升级
           ================================================================ */
        .page-panel { display: none; }
        .page-panel.active { display: block; animation: pageSlideIn .4s cubic-bezier(.4,0,.2,1); }
        @keyframes pageSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ================================================================
           卡片交错入场
           ================================================================ */
        .card-stagger { opacity: 0; transform: translateY(20px); animation: cardStaggerIn .5s ease forwards; }
        .card-stagger:nth-child(1) { animation-delay: .05s; }
        .card-stagger:nth-child(2) { animation-delay: .1s; }
        .card-stagger:nth-child(3) { animation-delay: .15s; }
        .card-stagger:nth-child(4) { animation-delay: .2s; }
        @keyframes cardStaggerIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================================================================
           操作反馈动画
           ================================================================ */
        .toast-anim-success { animation: toastSuccess .5s ease; }
        .toast-anim-fail { animation: toastFail .5s ease; }
        @keyframes toastSuccess {
            0% { transform: scale(.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastFail {
            0%, 100% { transform: translateX(0); }
            10%, 50%, 90% { transform: translateX(-4px); }
            30%, 70% { transform: translateX(4px); }
        }

        /* ================================================================
           鼠标跟随光效
           ================================================================ */
        .card-glow { position: relative; overflow: hidden; }
        .card-glow .glow-spot {
            position: absolute; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(102,126,234,.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0; transition: opacity .3s;
            z-index: 0;
        }
        .card-glow:hover .glow-spot { opacity: 1; }

        /* ================================================================
           行展开详情
           ================================================================ */
        .row-detail-row td {
            padding: 0 !important; border: none !important;
            background: var(--bg-card) !important;
        }
        .row-detail-wrap {
            max-height: 0; overflow: hidden;
            transition: max-height .35s ease, padding .35s ease;
            padding: 0 16px;
        }
        .row-detail-wrap.open {
            max-height: 400px; padding: 14px 16px;
        }
        .row-detail-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px;
            font-size: 12px;
        }
        .row-detail-content .rd-label { color: var(--text-muted); }
        .row-detail-content .rd-value { color: var(--text-secondary); word-break: break-all; font-family: monospace; }
        .row-expand-detail td {
            padding: 0 !important; border: none !important;
            background: var(--bg-card) !important;
        }
        .row-detail-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px;
            font-size: 12px; padding: 14px 16px;
        }
        .rd-section { display: flex; flex-direction: column; gap: 2px; }
        .rd-section .rd-label { color: var(--text-muted); font-size: 11px; }
        .rd-section .rd-value { color: var(--text-secondary); word-break: break-all; }
        .rd-urls {
            display: flex; gap: 10px; padding: 0 16px 14px; flex-wrap: wrap;
        }
        .rd-url-item {
            flex: 1; min-width: 200px; background: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 8px 12px; font-size: 12px;
        }
        .rd-url-item code {

<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.js"></script>
<script>
    // ============================================================
    //  全局变量
    // ============================================================
    var token = localStorage.getItem('token');
    var currentTab = 'dashboard';
    var currentProjectId = null;
    var projectList = [];
    var layer, $;

    // 未登录时跳转到登录页
    if (!token) { window.location.href = '/login'; }

    // ============================================================
    //  主题切换
    // ============================================================
    (function initTheme() {
        var saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    })();

    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        layer.msg(next === 'dark' ? '<i class="fas fa-moon"></i> 已切换为暗夜模式' : '<i class="fas fa-sun"></i> 已切换为白天模式', {icon: 1, time: 1500});
    }

    // ============================================================
    //  AJAX 封装（自动携带 token 请求头，统一错误处理）
    // ============================================================
    function ajax(options) {
        if (!options.headers) options.headers = {};
        options.headers['Authorization'] = token;

        // 保存原始回调
        var originalSuccess = options.success;
        var originalError = options.error;

        // 注入统一的 error 处理（保留原始 error 回调）
        options.error = function(xhr) {
            // ===== Token 过期/未登录 => 直接跳转登录页 =====
            if (xhr.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login';
                return;
            }

            var msg = '请求失败';
            try {
                var resp = JSON.parse(xhr.responseText);
                msg = resp.msg || ('HTTP ' + xhr.status);
            } catch(e) {
                msg = '网络异常 (' + xhr.status + ')';
            }
            // 调用原始 error 回调（如 readme.html 的错误显示）
            if (typeof originalError === 'function') {
                originalError(xhr);
            } else {
                // 没有自定义 error 时才弹出 toast
                if (typeof layer !== 'undefined' && layer.msg) {
                    layer.msg('<i class=\"fas fa-exclamation-circle\"></i> ' + msg, {icon: 2, time: 3000});
                } else {
                    alert(msg);
                }
            }
        };

        // 包装 success：统一检查 code
        options.success = function(res) {
            if (res && res.code !== 200) {
                // ===== Token 过期（Sa-Token 返回 code=401）=====
                if (res.code === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return;
                }
                if (typeof layer !== 'undefined' && layer.msg) {
                    layer.msg('<i class=\"fas fa-exclamation-circle\"></i> ' + (res.msg || '操作失败'), {icon: 2, time: 3000});
                } else {
                    alert(res.msg || '操作失败');
                }
                return;
            }
            if (originalSuccess) originalSuccess(res);
        };

        return $.ajax(options);
    }

    // ============================================================
    //  格式校验工具
    // ============================================================
    function validateCaseData(val, method) {
        if (!val || !val.trim()) return { ok: true, msg: '' };
        var v = val.trim();
        if (v === '{}') return { ok: true, msg: '' };
        try {
            var obj = JSON.parse(v);
            if (typeof obj !== 'object' || obj === null) return { ok: false, msg: '请求数据必须是 JSON 对象 {} 或 JSON 字符串' };
            return { ok: true, msg: '' };
        } catch(e) {
            if (method && method.toUpperCase() === 'GET' && v.indexOf('=') > -1) {
                return { ok: true, msg: '' };
            }
            return { ok: false, msg: 'JSON 格式错误：' + e.message.substring(0, 60) };
        }
    }

    function validateCheckRules(val) {
        if (!val || !val.trim()) return { ok: true, msg: '' };
        var v = val.trim();
        try {
            var arr = JSON.parse(v);
            if (!Array.isArray(arr)) return { ok: false, msg: '断言规则必须是 JSON 数组 [...]，不能是对象' };
            for (var i = 0; i < arr.length; i++) {
                var rule = arr[i];
                if (typeof rule !== 'object' || rule === null || Array.isArray(rule)) {
                    return { ok: false, msg: '第 ' + (i+1) + ' 条规则格式错误，必须是对象 {}' };
                }
                var keys = Object.keys(rule);
                if (keys.length === 0) return { ok: false, msg: '第 ' + (i+1) + ' 条规则为空' };
                var validKeys = ['json', 'exist', 'not_exist', 'sql', 'status_code'];
                var invalidKeys = keys.filter(function(k) { return validKeys.indexOf(k) === -1; });
                if (invalidKeys.length > 0) {
                    return { ok: false, msg: '第 ' + (i+1) + ' 条规则包含未知关键字: ' + invalidKeys.join(', ') + '（支持: json, exist, not_exist, sql, status_code）' };
                }
                if (rule.sql) {
                    if (!Array.isArray(rule.sql) || rule.sql.length < 2) {
                        return { ok: false, msg: '第 ' + (i+1) + ' 条 sql 规则格式错误，应为 ["环境名", "SQL语句"]' };
                    }
                }
            }
            return { ok: true, msg: '' };
        } catch(e) {
            return { ok: false, msg: 'JSON 格式错误：' + e.message.substring(0, 60) };
        }
    }

    function validateExpectedResults(rulesVal, expectedVal) {
        if (!rulesVal || !rulesVal.trim()) return { ok: true, msg: '' };
        if (!expectedVal || !expectedVal.trim()) return { ok: false, msg: '已填写断言规则，期望结果不能为空' };
        try {
            var rules = JSON.parse(rulesVal);
            var expected = JSON.parse(expectedVal);
            if (!Array.isArray(rules) || !Array.isArray(expected)) return { ok: true, msg: '' };
            if (rules.length !== expected.length) {
                return { ok: false, msg: '断言 ' + rules.length + ' 条，期望 ' + expected.length + ' 个，数量不匹配' };
            }
            return { ok: true, msg: '' };
        } catch(e) {
            return { ok: false, msg: 'JSON 格式错误：' + e.message.substring(0, 60) };
        }
    }

    function validateInterface(iface) {
        var errors = [];
        if (!iface.apiName || !iface.apiName.trim()) errors.push('接口名称不能为空');
        if (!iface.method) errors.push('请求方法不能为空');
        if (!iface.urlDev && !iface.urlUat && !iface.urlPro) errors.push('至少填写一个环境的 URL');
        return errors;
    }

    function validateTestcase(tc) {
        var errors = [];
        if (!tc.caseTitle || !tc.caseTitle.trim()) errors.push('用例标题不能为空');
        if (!tc.interfaceId) errors.push('接口ID不能为空');
        if (!tc.env) errors.push('环境不能为空');
        var dataResult = validateCaseData(tc.caseData, '');
        if (!dataResult.ok) errors.push('请求数据：' + dataResult.msg);
        var rulesResult = validateCheckRules(tc.checkRules);
        if (!rulesResult.ok) errors.push('断言规则：' + rulesResult.msg);
        var expectedResult = validateExpectedResults(tc.checkRules, tc.expectedResults);
        if (!expectedResult.ok) errors.push('期望结果：' + expectedResult.msg);
        return errors;
    }

    function buildWarnDot(errors) {
        if (!errors || errors.length === 0) return '';
        var tipText = errors.join('；');
        var tipId = 'wd_' + Math.random().toString(36).substring(2, 8);
        return '<span class="warn-dot" id="' + tipId + '" data-tip="' + escHtml(tipText).replace(/"/g, '&quot;') + '" onmouseenter="showWarnTip(this)" onmouseleave="hideWarnTip(this)">!</span>';
    }

    var _warnTipIndex = null;
    function showWarnTip(el) {
        if (_warnTipIndex !== null) { try { layer.close(_warnTipIndex); } catch(e){} }
        var tip = el.getAttribute('data-tip') || '';
        var theme = document.documentElement.getAttribute('data-theme') || 'dark';
        var bgColor = theme === 'light' ? 'rgba(50,50,50,0.95)' : 'rgba(30,30,60,0.95)';
        _warnTipIndex = layer.tips('<span style="font-size:12px;line-height:1.6;">' + tip + '</span>', '#' + el.id, {
            tips: [1, bgColor],
            time: 0,
            maxWidth: 360,
            area: 'auto',
            skin: 'warn-layer-tip'
        });
    }
    function hideWarnTip(el) {
        if (_warnTipIndex !== null) { try { layer.close(_warnTipIndex); } catch(e){} _warnTipIndex = null; }
    }

    // ============================================================
    //  侧边栏折叠
    // ============================================================
    function toggleSidebar() {
        var sidebar = document.querySelector('.sidebar');
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    }
    (function initSidebar() {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            document.querySelector('.sidebar').classList.add('collapsed');
        }
    })();

    // ============================================================
    //  面包屑导航
    // ============================================================
    var breadcrumbMap = {
        interface: '接口管理', testcase: '用例管理', dify: 'Dify 工作流',
        dashboard: '数据统计', user: '用户管理', role: '角色管理',
        permission: '权限管理', 'open-api': 'Open API 文档',
        readme: '项目文档', guide: '用例格式指引'
    };
    var breadcrumbSectionMap = {
        interface: '业务管理', testcase: '业务管理', dify: '业务管理',

    var searchDebounceTimer = null;
    function onGlobalSearch(keyword) {
        clearTimeout(searchDebounceTimer);
        var dropdown = document.getElementById('searchDropdown');
        if (!keyword || !keyword.trim()) {
            dropdown.classList.remove('show');
            dropdown.innerHTML = '';
            return;
        }
        searchDebounceTimer = setTimeout(function() {
            var items = [];
            var done = 0;
            var totalRequests = 5;
            function renderResults() {
                done++;
                if (done < totalRequests) return;
                var html = '';
                if (items.length === 0) {
                    html = '<div class="sd-empty"><i class="fas fa-search" style="font-size:20px;display:block;margin-bottom:8px;"></i>未找到相关结果</div>';
                } else {
                    var groups = [
                        { key: 'iface', label: '接口', icon: 'fas fa-plug', tab: 'interface', color: '#64b5f6' },
                        { key: 'tc', label: '用例', icon: 'fas fa-vial', tab: 'testcase', color: '#66bb6a' },
                        { key: 'user', label: '用户', icon: 'fas fa-user', tab: 'user', color: '#ffa726' },
                        { key: 'role', label: '角色', icon: 'fas fa-user-tag', tab: 'role', color: '#ab47bc' },
                        { key: 'perm', label: '权限', icon: 'fas fa-shield-halved', tab: 'permission', color: '#ef5350' }
                    ];
                    groups.forEach(function(g) {
                        var groupItems = items.filter(function(x) { return x.type === g.key; });
                        if (groupItems.length > 0) {
                            html += '<div class="sd-header"><i class="' + g.icon + '" style="color:' + g.color + ';"></i> ' + g.label + '</div>';
                            groupItems.forEach(function(item) {
                                var searchKeyword = keyword;
                                html += '<div class="sd-item" onclick="searchAndSwitchTab(\'' + g.tab + '\',\'' + escHtml(searchKeyword).replace(/'/g, "\\'") + '\')"><div class="sd-icon" style="background:' + g.color + '22;color:' + g.color + ';"><i class="' + g.icon + '"></i></div><div class="sd-text"><div class="sd-name">' + escHtml(item.name) + '</div><div class="sd-desc">' + escHtml(item.desc) + '</div></div></div>';
                            });
                        }
                    });
                }
                dropdown.innerHTML = html;
                dropdown.classList.add('show');
            }
            var ifaceApi = getProjectApi('/interface/page?pageNum=1&pageSize=5&keyword=');
            if (ifaceApi) {
                $.ajax({
                    url: ifaceApi + encodeURIComponent(keyword),
                    headers: { 'Authorization': token },
                    success: function(res) {
                        if (res && res.code === 200 && res.data && res.data.records) {
                            res.data.records.forEach(function(item) {
                                items.push({ type: 'iface', name: item.apiName, desc: item.method + ' ' + (item.urlDev || item.urlUat || item.urlPro || ''), id: item.id });
                            });
                        }
                        renderResults();
                    },
                    error: function() { renderResults(); }
                });
            } else { renderResults(); }
            var tcApi = getProjectApi('/testcase/page?pageNum=1&pageSize=5&keyword=');
            if (tcApi) {
                $.ajax({
                    url: tcApi + encodeURIComponent(keyword),
                    headers: { 'Authorization': token },
                    success: function(res) {
                        if (res && res.code === 200 && res.data && res.data.records) {
                            res.data.records.forEach(function(item) {
                                items.push({ type: 'tc', name: item.caseTitle, desc: '环境: ' + (item.env || '-').toUpperCase(), id: item.id });
                            });
                        }
                        renderResults();
                    },
                    error: function() { renderResults(); }
                });
            } else { renderResults(); }
            $.ajax({
                url: '/api/user/page?pageNum=1&pageSize=5&keyword=' + encodeURIComponent(keyword),
                headers: { 'Authorization': token },
                success: function(res) {
                    if (res && res.code === 200 && res.data && res.data.records) {
                        res.data.records.forEach(function(item) {
                            items.push({ type: 'user', name: item.username, desc: item.nickname || item.email || '-', id: item.id });
                        });
                    }
                    renderResults();
                },
                error: function() { renderResults(); }
            });
            $.ajax({
                url: '/api/role/page?pageNum=1&pageSize=5&keyword=' + encodeURIComponent(keyword),
                headers: { 'Authorization': token },
                success: function(res) {
                    if (res && res.code === 200 && res.data && res.data.records) {
                        res.data.records.forEach(function(item) {
                            items.push({ type: 'role', name: item.roleName, desc: item.roleCode, id: item.id });
                        });
                    }
                    renderResults();
                },
                error: function() { renderResults(); }
            });
            $.ajax({
                url: '/api/permission/page?pageNum=1&pageSize=5&keyword=' + encodeURIComponent(keyword),
                headers: { 'Authorization': token },
                success: function(res) {
                    if (res && res.code === 200 && res.data && res.data.records) {
                        res.data.records.forEach(function(item) {
                            items.push({ type: 'perm', name: item.permName, desc: item.permCode, id: item.id });
                        });
                    }
                    renderResults();
                },

    function searchAndSwitchTab(tab, keyword) {

    // ============================================================
    //  操作反馈动画（增强 layer.msg）
    // ============================================================
    var _origLayerMsg = null;
    function enhanceLayerMsg() {
        if (!layer || !layer.msg || _origLayerMsg) return;
        _origLayerMsg = layer.msg;
        layer.msg = function(content, options) {
            var result = _origLayerMsg.call(layer, content, options);
            if (result && typeof result === 'string') {
                var el = document.getElementById(result);
                if (el) {
                    var icon = el.querySelector('.layui-layer-ico');
                    if (icon) {
                        var iconNum = parseInt(icon.className.match(/layui-layer-ico(\d)/) && RegExp.$1);
                        if (iconNum === 1) el.classList.add('toast-anim-success');
                        else if (iconNum === 2) el.classList.add('toast-anim-fail');
                    }
                }
            }
            return result;
        };
    }

    // ============================================================
    //  页面切换（增强版）
    // ============================================================
    function switchTab(tab) {
        currentTab = tab;
        showSkeleton();
        // 更新侧边栏高亮
        document.querySelectorAll('.nav-item').forEach(function(el) {
            el.classList.toggle('active', el.dataset.tab === tab);
        });
        // 切换面板显示
        document.querySelectorAll('.page-panel').forEach(function(el) {
            el.classList.toggle('active', el.id === 'panel-' + tab);
        });
        // 更新顶部标题
        var projectName = '';
        if (window.currentProjectId && window.projectList) {
            var p = window.projectList.find(function(item) { return item.id === window.currentProjectId; });
            if (p) projectName = p.projectName;
        }
        var titles = {
            interface: '<i class="fas fa-plug"></i> 接口管理' + (projectName ? ' <span style="font-size:12px;opacity:.6;font-weight:400;">— ' + escHtml(projectName) + '</span>' : ''),
            testcase: '<i class="fas fa-vial"></i> 用例管理' + (projectName ? ' <span style="font-size:12px;opacity:.6;font-weight:400;">— ' + escHtml(projectName) + '</span>' : ''),
            dify: '<i class="fas fa-robot"></i> Dify 工作流' + (projectName ? ' <span style="font-size:12px;opacity:.6;font-weight:400;">— ' + escHtml(projectName) + '</span>' : ''),
            dashboard: '<i class="fas fa-chart-pie"></i> 数据统计' + (projectName ? ' <span style="font-size:12px;opacity:.6;font-weight:400;">— ' + escHtml(projectName) + '</span>' : ''),
            project: '<i class="fas fa-folder-tree"></i> 项目管理',
            user: '<i class="fas fa-users"></i> 用户管理',
            role: '<i class="fas fa-user-tag"></i> 角色管理',
            permission: '<i class="fas fa-shield-halved"></i> 权限管理',
            'open-api': '<i class="fas fa-book-open"></i> Open API 文档',
            readme: '<i class="fas fa-file-alt"></i> 项目文档（README）',
            guide: '<i class="fas fa-graduation-cap"></i> 用例格式指引'
        };
        document.getElementById('pageTitle').innerHTML = titles[tab] || tab;
        updateBreadcrumb(tab);
        // 触发对应页面数据加载
        var loaders = { interface: loadInterface, testcase: loadTestcase, dify: null, dashboard: loadDashboard, project: loadProject, user: loadUser, role: loadRole, permission: loadPermission, 'open-api': null, readme: 'readme', guide: null };
        if (loaders[tab]) {
            if (loaders[tab] === 'readme') {
                setTimeout(function() {
                    if (typeof refreshReadme === 'function') refreshReadme();
                    hideSkeleton();
                }, 200);
            } else {
                loaders[tab](1);
                setTimeout(hideSkeleton, 400);
            }
        } else {
            setTimeout(hideSkeleton, 300);
        }
    }

    // ============================================================
    //  侧边栏权限控制：无权限时隐藏菜单
    // ============================================================
    function applySidebarPermissions(perms) {
        document.querySelectorAll('.nav-item[data-perm]').forEach(function(el) {
            var requiredPerm = el.getAttribute('data-perm');
            if (requiredPerm && perms.indexOf(requiredPerm) === -1) {
                el.style.display = 'none';
            } else {
                el.style.display = '';
            }
        });
        // 自动隐藏空的 nav-section
        document.querySelectorAll('.nav-section').forEach(function(section) {
            var visibleItems = section.querySelectorAll('.nav-item[style*="display: none"]');
            var allItems = section.querySelectorAll('.nav-item');
            if (visibleItems.length === allItems.length && allItems.length > 0) {
                section.style.display = 'none';
            } else {
                section.style.display = '';
            }
        });
    }

    function loadUserSelector(callback) {
        var keyword = document.getElementById('us_keyword') ? document.getElementById('us_keyword').value : '';
        ajax({
            url: '/api/user/search?keyword=' + encodeURIComponent(keyword) + '&limit=50',
            method: 'GET',
            success: function(res) {
                var container = document.getElementById('us_list');
                if (!container) return;
                if (res.code === 200 && res.data && res.data.length > 0) {
                    var html = '<table class="layui-table" lay-skin="line"><thead><tr><th>用户名</th><th>昵称</th><th>邮箱</th><th>操作</th></tr></thead><tbody>';
                    res.data.forEach(function(u) {
                        html += '<tr style="cursor:pointer;" onclick="selectUser(' + u.id + ',\'' + escHtml(u.username).replace(/'/g, "\\'") + '\',\'' + escHtml(u.nickname || '').replace(/'/g, "\\'") + '\')">';
                        html += '<td><strong>' + escHtml(u.username) + '</strong></td>';
                        html += '<td>' + escHtml(u.nickname || '-') + '</td>';
                        html += '<td>' + escHtml(u.email || '-') + '</td>';
                        html += '<td><button class="layui-btn layui-btn-xs layui-btn-normal" style="border-radius:4px;">选择</button></td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                    // 保存回调
                    container.dataset.callback = callback ? 'yes' : '';
                    window._usCallback = callback;
                } else {
                    container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;"><i class="fas fa-users" style="font-size:24px;display:block;margin-bottom:8px;"></i>未找到用户</div>';
                }
            }
        });
    }

    function selectUser(userId, username, nickname) {
        var cb = window._usCallback;
        // 只关闭用户选择器弹窗，不关闭父级弹窗
        if (window._usLayerIndex) {
            layer.close(window._usLayerIndex);
            window._usLayerIndex = null;
        }
        if (cb) {
            cb({ id: userId, username: username, nickname: nickname });
        }
    }

    // ============================================================
    //  项目切换器
    // ============================================================
    function loadProjects(callback) {
        ajax({
            url: '/api/project/list', method: 'GET',
            success: function(res) {
                if (res.code === 200) {
                    projectList = res.data || [];
                    var sel = document.getElementById('projectSelect');
                    sel.innerHTML = '';
                    if (projectList.length === 0) {
                        sel.innerHTML = '<option value="">无可用项目</option>';
                        currentProjectId = null;
                    } else {
                        projectList.forEach(function(p) {
                            var selected = (currentProjectId === p.id) ? ' selected' : '';
                            sel.innerHTML += '<option value="' + p.id + '"' + selected + '>' + escHtml(p.projectName) + '</option>';
                        });
                        if (!currentProjectId && projectList.length > 0) {
                            currentProjectId = projectList[0].id;
                            sel.value = currentProjectId;
                        }
                    }
                }
                if (callback) callback();
            },
            error: function() {
                if (callback) callback();
            }
        });
    }

                            html += '<td>' + escHtml(m.nickname || '-') + '</td>';

    /**

    /**
     * 渲染分页组件
     * @param {string} elem - 分页容器 ID
     * @param {object} pageInfo - 分页信息 {current, total, size}
     * @param {function} loadFn - 翻页回调函数
     */
    function renderPager(elem, pageInfo, loadFn) {
        layui.laypage.render({
            elem: elem,
            curr: pageInfo.current,
            count: pageInfo.total,
            limit: pageInfo.size || 10,
            prev: '<i class="fas fa-chevron-left"></i>',
            next: '<i class="fas fa-chevron-right"></i>',
            jump: function(obj, first) { if (!first) loadFn(obj.curr); }
        });
    }

    // ============================================================
    //  虚拟滚动工具
    // ============================================================
    var VirtualScroll = (function() {
        function VS(container, options) {
            this.container = typeof container === 'string' ? document.querySelector(container) : container;
            this.rowHeight = (options && options.rowHeight) || 44;
            this.buffer = (options && options.buffer) || 5;
            this.renderRow = options && options.renderRow;
            this.data = [];
            this.spacer = null;
            this.viewport = null;
            this._scrollHandler = null;
            if (this.container && this.renderRow) this._init();
        }
        VS.prototype._init = function() {
            this.container.innerHTML = '';
            this.container.classList.add('virtual-scroll-container');
            this.spacer = document.createElement('div');
            this.spacer.className = 'virtual-scroll-spacer';
            this.viewport = document.createElement('div');
            this.viewport.className = 'virtual-scroll-viewport';
            var table = document.createElement('table');
            table.className = 'layui-table';
            table.setAttribute('lay-skin', 'line');
            table.style.tableLayout = 'auto';
            this.tbody = document.createElement('tbody');
            table.appendChild(this.tbody);
            this.viewport.appendChild(table);
            this.spacer.appendChild(this.viewport);
            this.container.appendChild(this.spacer);
            var self = this;
            this._scrollHandler = function() { self._onScroll(); };
            this.container.addEventListener('scroll', this._scrollHandler);
        };
        VS.prototype.setData = function(data) {
            this.data = data || [];
            this.spacer.style.height = (this.data.length * this.rowHeight) + 'px';
            this._renderVisible();
        };
        VS.prototype._onScroll = function() {
            this._renderVisible();
        };
        VS.prototype._renderVisible = function() {
            var scrollTop = this.container.scrollTop;
            var viewHeight = this.container.clientHeight;
            var startIdx = Math.max(0, Math.floor(scrollTop / this.rowHeight) - this.buffer);
            var endIdx = Math.min(this.data.length, Math.ceil((scrollTop + viewHeight) / this.rowHeight) + this.buffer);
            var html = '';
            for (var i = startIdx; i < endIdx; i++) {
                html += this.renderRow(this.data[i], i);
            }
            this.tbody.innerHTML = html;
            this.viewport.style.transform = 'translateY(' + (startIdx * this.rowHeight) + 'px)';
        };
        VS.prototype.destroy = function() {
            if (this._scrollHandler) {
                this.container.removeEventListener('scroll', this._scrollHandler);
            }
        };
        return VS;
    })();

    /**
     * HTML 转义（防 XSS）
     */
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ============================================================
    //  URL 单元格工具（截断 + 复制）
    // ============================================================
    /**
     * 渲染 URL 单元格 HTML（带截断和复制按钮）
     * @param {string} url - 完整的 URL
     * @returns {string} HTML 字符串
     */
    function renderUrlCell(url) {
        if (!url) return '<td class="url-cell" title=""><span class="url-text" style="color:#ccc;">-</span></td>';
        var safeUrl = escHtml(url);
        return '<td class="url-cell" title="' + safeUrl + '">' +
            '<span class="url-text">' + safeUrl + '</span>' +
            '<button class="url-copy-btn" onclick="copyUrl(this,\'' + safeUrl.replace(/'/g, "\\'") + '\')" title="复制URL"><i class="fas fa-copy"></i></button>' +
            '</td>';
    }

    /**
     * 复制 URL 到剪贴板
     */
    function copyUrl(btn, url) {
        if (!url) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function() {
                btn.className = 'url-copy-btn copied';
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(function() { btn.className = 'url-copy-btn'; btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 1500);
            });
        } else {
            // fallback
            var ta = document.createElement('textarea');
            ta.value = url; ta.style.position = 'fixed'; ta.style.left = '-9999px';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.className = 'url-copy-btn copied';
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(function() { btn.className = 'url-copy-btn'; btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 1500);
        }
    }
