<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 接口自动化中台</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Layui 样式（仅用于部分组件） -->
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css" rel="stylesheet">
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* ===== 登录容器 ===== */
        .login-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 30%, #302b63 60%, #24243e 100%);
            overflow: hidden;
        }

        /* ===== Canvas 粒子背景 ===== */
        #particleCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* ===== 装饰光晕 ===== */
        .glow-orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb:nth-child(2) {
            width: 500px; height: 500px;
            background: rgba(102,126,234,.15);
            top: -150px; left: -150px;
            animation: orbFloat1 12s ease-in-out infinite;
        }
        .glow-orb:nth-child(3) {
            width: 400px; height: 400px;
            background: rgba(118,75,162,.12);
            bottom: -100px; right: -100px;
            animation: orbFloat2 15s ease-in-out infinite;
        }
        .glow-orb:nth-child(4) {
            width: 300px; height: 300px;
            background: rgba(0,242,254,.08);
            top: 50%; left: 60%;
            animation: orbFloat3 10s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, 40px) scale(1.1); }
            66% { transform: translate(-30px, 80px) scale(.9); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-80px, -60px) scale(1.15); }
        }
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: .6; }
            50% { transform: translate(40px, -50px) scale(1.2); opacity: 1; }
        }

        /* ===== 玻璃拟态登录卡片 ===== */
        .login-card {
            position: relative; z-index: 1;
            width: 420px;
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 24px;
            padding: 48px 44px 38px;
            box-shadow: 0 30px 80px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
            opacity: 0; transform: translateY(40px) scale(.96);
            animation: cardEntrance .8s cubic-bezier(.23,1,.32,1) .2s forwards;
        }
        .login-card::before {
            content: '';
            position: absolute; inset: -2px; z-index: -1;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(102,126,234,.5), transparent 40%, transparent 60%, rgba(118,75,162,.4));
            opacity: 0;
            transition: opacity .6s;
        }
        .login-card:hover::before { opacity: 1; }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== Logo 区域 ===== */
        .login-logo {
            text-align: center; margin-bottom: 32px;
        }
        .login-logo .icon-wrap {
            width: 72px; height: 72px; margin: 0 auto 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; color: #fff;
            box-shadow: 0 10px 30px rgba(102,126,234,.4);
            animation: iconPulse 3s ease-in-out infinite;
            position: relative;
        }
        .icon-wrap::after {
            content: '';
            position: absolute; inset: -4px; border-radius: 26px;
            background: linear-gradient(135deg, #667eea, transparent, #764ba2);
            z-index: -1; opacity: .4;
            animation: iconGlow 3s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(102,126,234,.4); }
            50% { box-shadow: 0 14px 40px rgba(102,126,234,.6); }
        }
        @keyframes iconGlow {
            0%, 100% { opacity: .3; transform: scale(1); }
            50% { opacity: .6; transform: scale(1.05); }
        }

        .login-logo h1 {
            font-size: 22px; color: #fff; font-weight: 700;
            letter-spacing: 3px;
        }
        .login-logo h1 i { color: #667eea; margin-right: 6px; }
        .login-logo p {
            color: rgba(255,255,255,.45); font-size: 13px; margin-top: 6px;
            min-height: 20px;
        }
        .login-logo p .typewriter-cursor {
            display: inline-block; width: 2px; height: 15px;
            background: rgba(255,255,255,.5); margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ===== 表单 ===== */
        .login-card .layui-form-item { margin-bottom: 22px; }

        .input-group {
            display: flex; align-items: center;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px;
            padding: 0 16px;
            transition: all .35s ease;
            position: relative; overflow: hidden;
        }
        .input-group::after {
            content: '';
            position: absolute; bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all .4s ease;
            transform: translateX(-50%);
        }
        .input-group:focus-within {
            border-color: rgba(102,126,234,.35);
            background: rgba(255,255,255,.08);
            box-shadow: 0 0 30px rgba(102,126,234,.08);
        }
        .input-group:focus-within::after { width: 100%; }

        .input-group i {
            color: rgba(255,255,255,.35); font-size: 18px;
            margin-right: 12px; flex-shrink: 0;
            transition: color .35s;
        }
        .input-group:focus-within i { color: rgba(102,126,234,.8); }

        .input-group input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 15px; padding: 14px 0; width: 100%;
        }
        .input-group input::placeholder { color: rgba(255,255,255,.25); }
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover,
        .input-group input:-webkit-autofill:focus {
            -webkit-text-fill-color: #fff;
            -webkit-box-shadow: 0 0 0 1000px transparent inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* ===== 登录按钮 ===== */
        .login-btn {
            position: relative; overflow: hidden;
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; color: #fff; cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            box-shadow: 0 8px 25px rgba(102,126,234,.35);
            transition: all .4s ease; letter-spacing: 3px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(102,126,234,.5);
            background-position: 100% 100%;
        }
        .login-btn:active { transform: translateY(0) scale(.98); }
        .login-btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

        /* 按钮波纹 */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,.35);
            transform: scale(0);
            animation: rippleAnim .6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== 底部 ===== */
        .login-footer {
            text-align: center; margin-top: 28px;
            color: rgba(255,255,255,.2); font-size: 12px;
            letter-spacing: .5px;
        }

        /* ===== 错误消息 ===== */
        .error-msg {
            color: #ff6b6b; font-size: 13px; text-align: center;
            min-height: 22px; margin-bottom: 8px;
            opacity: 0; transform: translateY(-6px);
            transition: all .3s ease;
        }
        .error-msg.show {
            opacity: 1; transform: translateY(0);
            animation: shake .4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* ===== 加载动画 ===== */
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 登录成功粒子爆发 ===== */
        .burst-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }
        .burst-particle {
            position: absolute; width: 6px; height: 6px;
            border-radius: 50%;
            animation: burstFly 1s cubic-bezier(.23,1,.32,1) forwards;
        }
        @keyframes burstFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* ===== 鼠标跟随光效 ===== */
        .login-card .card-glow-spot {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(102,126,234,.18) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0; transition: opacity .4s;
            z-index: 0;
        }
        .login-card:hover .card-glow-spot { opacity: 1; }

        /* ===== 输入框打字波纹 ===== */
        .input-group .input-ripple {
            position: absolute; bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all .4s ease;
            transform: translateX(-50%);
        }
        .input-group:focus-within .input-ripple { width: 100%; }
        .input-group .typing-ripple {
            position: absolute; border-radius: 50%;
            background: rgba(102,126,234,.15);
            transform: scale(0);
            animation: typingRipple .6s ease-out;
            pointer-events: none;
        }
        @keyframes typingRipple {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== 登录成功增强过渡 ===== */
        .login-card.success-exit {
            animation: successExit .6s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes successExit {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(.85) translateY(-40px); opacity: 0; }
        }
        .login-wrapper.success-bg {
            animation: bgFlash .8s ease forwards;
        }
        @keyframes bgFlash {
            0% { background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 30%, #302b63 60%, #24243e 100%); }
            40% { background: linear-gradient(135deg, rgba(102,126,234,.3) 0%, rgba(118,75,162,.2) 50%, #302b63 100%); }
            100% { background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 30%, #302b63 60%, #24243e 100%); opacity: 0; }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .login-card { width: 92%; padding: 36px 26px 30px; }
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <!-- 光晕装饰 -->
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <!-- 粒子背景 Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- 登录卡片 -->
    <div class="login-card">
        <!-- 鼠标跟随光效 -->
        <div class="card-glow-spot" id="cardGlowSpot"></div>

        <!-- Logo -->
        <div class="login-logo">
            <div class="icon-wrap"><i class="fas fa-bolt"></i></div>
            <h1><i class="fas fa-cog"></i> 接口自动化中台</h1>
            <p id="typewriterText"><span class="typewriter-cursor"></span></p>
        </div>

        <!-- 表单 -->
        <form onsubmit="return false;">
            <div class="error-msg" id="errorMsg"></div>

            <div class="layui-form-item">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" autofocus onkeydown="onInputTyping(event, this)">
                    <div class="input-ripple"></div>
                </div>
            </div>

            <div class="layui-form-item">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" onkeydown="onInputTyping(event, this)">
                    <div class="input-ripple"></div>
                </div>
            </div>

            <div class="layui-form-item" style="margin-bottom:0;">
                <button class="login-btn" id="loginBtn" onclick="doLogin()">
                    <i class="fas fa-shield-halved"></i> 登 录
                </button>
            </div>
        </form>

        <div class="login-footer">
            <i class="fas fa-database"></i> 接口自动化测试中台 v2.0
        </div>
    </div>
</div>

<!-- ===== 脚本 ===== -->
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.js"></script>
<script>
    // ============================================================
    //  鼠标跟随光效
    // ============================================================
    (function initCardGlow() {
        var card = document.querySelector('.login-card');
        var spot = document.getElementById('cardGlowSpot');
        if (!card || !spot) return;
        card.addEventListener('mousemove', function(e) {
            var rect = card.getBoundingClientRect();
            spot.style.left = (e.clientX - rect.left) + 'px';
            spot.style.top = (e.clientY - rect.top) + 'px';
        });
    })();

    // ============================================================
    //  输入框打字波纹
    // ============================================================
    function onInputTyping(e, input) {
        if (e.key === 'Enter') return;
        var group = input.closest('.input-group');
        if (!group) return;
        var ripple = document.createElement('span');
        ripple.className = 'typing-ripple';
        var rect = input.getBoundingClientRect();
        var groupRect = group.getBoundingClientRect();
        var size = 20;
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (rect.left - groupRect.left + 20) + 'px';
        ripple.style.top = (rect.top - groupRect.top + rect.height / 2) + 'px';
        group.appendChild(ripple);
        setTimeout(function() { ripple.remove(); }, 600);
    }

    // ============================================================
    //  检测是否已登录
    // ============================================================
    if (localStorage.getItem('token')) {
        window.location.href = '/';
    }

    // ============================================================
    //  粒子背景（Canvas）
    // ============================================================
    (function initParticles() {
        var canvas = document.getElementById('particleCanvas');
        var ctx = canvas.getContext('2d');
        var particles = [];
        var PARTICLE_COUNT = 80;
        var CONNECT_DIST = 150;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function Particle() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - .5) * .4;
            this.vy = (Math.random() - .5) * .4;
            this.r = Math.random() * 2 + 1.2;
        }
        Particle.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        };
        Particle.prototype.draw = function() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,.4)';
            ctx.fill();
        };

        for (var i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        var mouseX = -9999, mouseY = -9999;
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(function(p) {
                p.update();
                p.draw();
            });

            // 粒子间连线
            for (var i = 0; i < particles.length; i++) {
                for (var j = i + 1; j < particles.length; j++) {
                    var dx = particles[i].x - particles[j].x;
                    var dy = particles[i].y - particles[j].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECT_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(255,255,255,' + (1 - dist / CONNECT_DIST) * .12 + ')';
                        ctx.lineWidth = .8;
                        ctx.stroke();
                    }
                }
                // 粒子与鼠标连线
                var dmx = particles[i].x - mouseX;
                var dmy = particles[i].y - mouseY;
                var distM = Math.sqrt(dmx * dmx + dmy * dmy);
                if (distM < CONNECT_DIST * 1.2) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(mouseX, mouseY);
                    ctx.strokeStyle = 'rgba(102,126,234,' + (1 - distM / (CONNECT_DIST * 1.2)) * .25 + ')';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ============================================================
    //  打字机效果
    // ============================================================
    (function typewriter() {
        var text = 'API Test Automation Platform';
        var idx = 0;
        var el = document.getElementById('typewriterText');
        function tick() {
            if (idx < text.length) {
                el.innerHTML = text.substring(0, idx + 1) + '<span class="typewriter-cursor"></span>';
                idx++;
                setTimeout(tick, 40 + Math.random() * 30);
            } else {
                el.innerHTML = text + '<span class="typewriter-cursor"></span>';
                // 光标闪烁持续
            }
        }
        tick();
    })();

    // ============================================================
    //  登录逻辑
    // ============================================================
    function doLogin() {
        var username = document.getElementById('loginUsername').value.trim();
        var password = document.getElementById('loginPassword').value.trim();
        var btn = document.getElementById('loginBtn');

        if (!username) { showError('请输入用户名'); return; }
        if (!password) { showError('请输入密码'); return; }

        // 禁用按钮 + 加载态
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 登录中...';

        layui.$.ajax({
            url: '/api/auth/login',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ username: username, password: password }),
            success: function(res) {
                if (res.code === 200) {
                    localStorage.setItem('token', res.data.token);
                    // 粒子爆发效果
                    burstEffect();
                    // 卡片收缩动画
                    document.querySelector('.login-card').classList.add('success-exit');
                    // 背景闪光
                    document.querySelector('.login-wrapper').classList.add('success-bg');
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 900);
                } else {
                    showError(res.msg || '用户名或密码错误');
                    resetBtn();
                }
            },
            error: function() {
                showError('网络异常，请检查服务器连接');
                resetBtn();
            }
        });
    }

    /** 粒子爆发特效 */
    function burstEffect() {
        var container = document.createElement('div');
        container.className = 'burst-container';
        document.body.appendChild(container);
        var colors = ['#667eea','#764ba2','#38ef7d','#f5576c','#4facfe','#f093fb','#00f2fe'];
        var cx = window.innerWidth / 2;
        var cy = window.innerHeight / 2;
        for (var i = 0; i < 60; i++) {
            var p = document.createElement('div');
            p.className = 'burst-particle';
            var angle = Math.random() * Math.PI * 2;
            var dist = 120 + Math.random() * 280;
            p.style.cssText =
                'left:' + cx + 'px;top:' + cy + 'px;' +
                'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
                'width:' + (4 + Math.random() * 6) + 'px;height:' + (4 + Math.random() * 6) + 'px;' +
                '--tx:' + Math.cos(angle) * dist + 'px;--ty:' + Math.sin(angle) * dist + 'px;' +
                'animation-delay:' + (Math.random() * .15) + 's;';
            container.appendChild(p);
        }
        setTimeout(function() { container.remove(); }, 1500);
    }

    function showError(msg) {
        var el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
        // 3秒后自动隐藏
        clearTimeout(el._hideTimer);
        el._hideTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
    }

    function resetBtn() {
        var btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-shield-halved"></i> 登 录';
    }

    // 回车登录
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });

    // 按钮波纹效果
    document.getElementById('loginBtn').addEventListener('click', function(e) {
        var rect = this.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(ripple);
        setTimeout(function() { ripple.remove(); }, 600);
    });

    // 自动聚焦
    document.getElementById('loginUsername').focus();
</script>
</body>
</html>
