<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 接口自动化中台</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Layui 样式 -->
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css" rel="stylesheet">
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== 登录容器：全屏渐变背景 + 动态粒子效果 ===== */
        .login-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
        }

        /* 渐变背景动画 */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== 装饰性圆形 ===== */
        .circle {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.03);
            animation: float 20s infinite ease-in-out;
        }
        .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .circle:nth-child(2) { width: 300px; height: 300px; bottom: -50px; right: -50px; animation-delay: -5s; }
        .circle:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 60%; animation-delay: -10s; }
        .circle:nth-child(4) { width: 150px; height: 150px; top: 20%; right: 15%; animation-delay: -3s; background: rgba(102,126,234,0.05); }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* ===== 玻璃拟态登录卡片 ===== */
        .login-card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 50px 45px 40px;
            width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-2px); }

        /* ===== Logo 区域 ===== */
        .login-logo {
            text-align: center; margin-bottom: 35px;
        }
        .login-logo .icon-wrap {
            width: 70px; height: 70px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff;
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .login-logo h1 {
            font-size: 22px; color: #fff; font-weight: 600;
            letter-spacing: 2px;
        }
        .login-logo p {
            color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 6px;
        }

        /* ===== 表单样式 ===== */
        .login-card .layui-form-item { margin-bottom: 22px; }

        /* 输入框组（图标 + 输入框） */
        .input-group {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0 16px;
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            border-color: rgba(102,126,234,0.6);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(102,126,234,0.15);
        }
        .input-group i {
            color: rgba(255,255,255,0.4); font-size: 18px;
            margin-right: 12px; flex-shrink: 0;
        }
        .input-group input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 15px; padding: 14px 0; width: 100%;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }

        /* ===== 登录按钮 ===== */
        .login-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; color: #fff; cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 25px rgba(102,126,234,0.35);
            transition: all 0.3s ease; letter-spacing: 2px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 35px rgba(102,126,234,0.5);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }

        /* ===== 底部信息 ===== */
        .login-footer {
            text-align: center; margin-top: 25px;
            color: rgba(255,255,255,0.3); font-size: 12px;
        }

        /* ===== 错误提醒 ===== */
        .error-msg {
            color: #ff6b6b; font-size: 13px; text-align: center;
            min-height: 20px; margin-bottom: 10px;
            opacity: 0; transition: opacity 0.3s;
        }
        .error-msg.show { opacity: 1; }

        /* ===== 加载动画 ===== */
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .login-card { width: 92%; padding: 35px 25px; }
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <!-- 装饰背景圆 -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="icon-wrap"><i class="fas fa-bolt"></i></div>
            <h1><i class="fas fa-cog" style="font-size:18px;margin-right:6px;color:#667eea;"></i> 接口自动化中台</h1>
            <p>API Test Automation Platform</p>
        </div>

        <!-- 表单 -->
        <form onsubmit="return false;">
            <div class="error-msg" id="errorMsg"></div>

            <div class="layui-form-item">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                </div>
            </div>

            <div class="layui-form-item">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                </div>
            </div>

            <div class="layui-form-item" style="margin-bottom:0;">
                <button class="login-btn" id="loginBtn" onclick="doLogin()">
                    <i class="fas fa-shield-halved"></i> 登 录
                </button>
            </div>
        </form>

        <div class="login-footer">
            <i class="fas fa-database"></i> 接口自动化测试中台 v1.0
        </div>
    </div>
</div>

<!-- ===== 脚本 ===== -->
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.js"></script>
<script>
    // 检测是否已登录
    if (localStorage.getItem('token')) {
        window.location.href = '/';
    }

    /** 执行登录 */
    function doLogin() {
        var username = document.getElementById('loginUsername').value.trim();
        var password = document.getElementById('loginPassword').value.trim();
        var errorEl = document.getElementById('errorMsg');
        var btn = document.getElementById('loginBtn');

        // 表单校验
        if (!username) { showError('请输入用户名'); return; }
        if (!password) { showError('请输入密码'); return; }

        // 禁用按钮 + 加载态
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 登录中...';

        layui.$.ajax({
            url: '/api/auth/login',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ username: username, password: password }),
            success: function (res) {
                if (res.code === 200) {
                    localStorage.setItem('token', res.data.token);
                    // 淡出动画
                    document.querySelector('.login-wrapper').style.opacity = '0';
                    document.querySelector('.login-wrapper').style.transition = 'opacity 0.5s';
                    setTimeout(function () {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showError(res.msg || '用户名或密码错误');
                    resetBtn();
                }
            },
            error: function () {
                showError('网络异常，请检查服务器连接');
                resetBtn();
            }
        });
    }

    /** 显示错误信息 */
    function showError(msg) {
        var el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
    }

    /** 重置登录按钮 */
    function resetBtn() {
        var btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-shield-halved"></i> 登 录';
    }

    // 回车登录
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin();
    });

    // 自动聚焦
    document.getElementById('loginUsername').focus();
</script>
</body>
</html>
